name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CSS
        run: bun run build:css

      - name: Build binaries
        run: |
          mkdir -p dist
          bun build src/main.ts --compile --minify --outfile dist/agent-link-linux-x64   --target bun-linux-x64
          bun build src/main.ts --compile --minify --outfile dist/agent-link-linux-arm64  --target bun-linux-arm64
          bun build src/main.ts --compile --minify --outfile dist/agent-link-darwin-x64   --target bun-darwin-x64
          bun build src/main.ts --compile --minify --outfile dist/agent-link-darwin-arm64  --target bun-darwin-arm64

      - name: Create checksums
        run: |
          cd dist
          sha256sum agent-link-linux-x64 agent-link-linux-arm64 agent-link-darwin-x64 agent-link-darwin-arm64 > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/agent-link-linux-x64
            dist/agent-link-linux-arm64
            dist/agent-link-darwin-x64
            dist/agent-link-darwin-arm64
            dist/checksums.txt
          generate_release_notes: true
