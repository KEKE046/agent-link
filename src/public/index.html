<!--
  Agent Link — 前端模块结构
  ═══════════════════════════════════════════════════
  index.html     本文件，HTML 骨架 + Alpine 模板
  app.js         核心状态、session 生命周期、SSE、send/switch/interrupt
  sidebar.js     侧边栏：分组、展开折叠、Add 弹窗（New/Browse）、节点管理
  renderer.js    消息渲染组件 + Alpine messages 组件

  组件通信：
    emit(name, detail) → window CustomEvent，所有组件统一用
    sidebar → app:  session-switch, session-create, session-remove, session-add,
                    folder-add, folder-remove, data-refresh
    app → sidebar:  通过响应式状态 (currentId, managed, managedFolders, activeSet, nodes)
    sidebar 自动展开:  $watch('currentId')

  样式：tailwind.input.css → styles.css (bunx @tailwindcss/cli 编译)

  改动须知：
    - 改模板时同步检查对应 JS 的 emit/状态引用
    - 改 JS 事件名时全局搜索 emit('xxx') 和 @xxx.window
    - 加新 public 文件时更新 src/assets.ts
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Link</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/renderer.js"></script>
  <script src="/app.js"></script>
  <script src="/sidebar.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 h-screen overflow-hidden">

<div x-data="app()" x-cloak class="flex h-screen"
     @session-switch.window="switchSession($event.detail)"
     @session-new.window="newSession()"
     @session-create.window="createSession($event.detail)"
     @session-remove.window="removeManaged($event.detail)"
     @session-add.window="addManaged($event.detail)"
     @folder-add.window="addFolder($event.detail)"
     @folder-remove.window="removeFolder($event.detail)"
     @data-refresh.window="refreshData()">

  <!-- Sidebar -->
  <div x-data="sidebar()" class="flex flex-shrink-0">
    <div class="bg-gray-900 flex flex-col flex-shrink-0 overflow-hidden transition-[width] duration-200"
         :style="`width: ${sidebarCollapsed ? 0 : sidebarWidth}px`"
         :class="sidebarCollapsed ? '' : 'border-r border-gray-800'">
      <div class="flex-1 overflow-y-auto">
        <!-- Unified session list: works for both panel and standalone mode -->
        <template x-for="n in groupedSessions" :key="n.nodeId">
          <div>
            <!-- Node header -->
            <div @click="toggleGroup('node:' + n.nodeId)"
                 class="px-3 py-1.5 flex items-center gap-1.5 cursor-pointer hover:bg-gray-800/50 text-xs text-gray-300 sticky top-0 bg-gray-900 border-b border-gray-800/50 z-10">
              <span x-text="expandedGroups.has('node:' + n.nodeId) ? '▾' : '▸'" class="text-gray-600 w-3"></span>
              <span class="w-2 h-2 rounded-full flex-shrink-0" :class="isNodeOnline(n.nodeId) ? 'bg-green-400' : 'bg-gray-600'"></span>
              <span class="truncate flex-1 font-semibold" x-text="n.label || n.nodeId"></span>
              <button @click.stop="openAddModal(n.nodeId)" title="Add session or folder"
                      class="sidebar-btn">+</button>
            </div>
            <!-- CWD groups -->
            <template x-if="expandedGroups.has('node:' + n.nodeId)">
              <div>
                <template x-for="g in n.cwdGroups" :key="n.nodeId + ':' + g.cwd">
                  <div>
                    <div class="pl-7 pr-3 py-1 flex items-center gap-1.5 hover:bg-gray-800/50 text-xs text-gray-400 sticky bg-gray-900 border-b border-gray-800/30" style="top:1.5rem">
                      <span @click="toggleGroup(n.nodeId + ':' + g.cwd)" x-text="expandedGroups.has(n.nodeId + ':' + g.cwd) ? '▾' : '▸'" class="text-gray-600 w-3 cursor-pointer"></span>
                      <span @click="g.sessions.length === 1 ? emit('session-switch', g.sessions[0].sessionId) : toggleGroup(n.nodeId + ':' + g.cwd)"
                            class="truncate flex-1 font-medium cursor-pointer" x-text="g.cwd"></span>
                      <span x-show="g.sessions.length > 1" class="text-gray-600 text-[10px]" x-text="'(' + g.sessions.length + ')'"></span>
                      <div class="relative">
                        <button @click.stop="folderMenu = folderMenu === (n.nodeId + ':' + g.cwd) ? null : (n.nodeId + ':' + g.cwd)"
                                class="sidebar-btn">…</button>
                        <div x-show="folderMenu === (n.nodeId + ':' + g.cwd)" @click.outside="folderMenu = null"
                             class="absolute right-0 top-full mt-0.5 bg-gray-800 border border-gray-700 rounded shadow-lg py-1 z-30 min-w-[6rem]">
                          <button @click.stop="emit('folder-remove', {cwd: g.cwd, nodeId: n.nodeId === '(local)' ? undefined : n.nodeId}); folderMenu = null"
                                  class="w-full text-left px-3 py-1 text-xs text-gray-300 hover:bg-gray-700">Remove</button>
                        </div>
                      </div>
                    </div>
                    <template x-if="expandedGroups.has(n.nodeId + ':' + g.cwd)">
                      <div>
                        <template x-for="s in g.sessions" :key="s.sessionId">
                          <div @click="emit('session-switch', s.sessionId)"
                               :class="currentId === s.sessionId ? 'bg-gray-800 border-l-2 border-blue-400' : 'border-l-2 border-transparent'"
                               class="pl-10 pr-3 py-1 cursor-pointer hover:bg-gray-800/50 group flex items-center gap-2"
                               :style="!isNodeOnline(n.nodeId) ? 'opacity:0.5' : ''">
                            <span class="w-2 h-2 rounded-full flex-shrink-0" :class="activeSet.has(s.sessionId) ? 'bg-green-400 animate-pulse' : 'bg-gray-600'"></span>
                            <span class="text-sm truncate flex-1" x-text="s.label || s.sessionId.slice(0, 8)"></span>
                            <button @click.stop="emit('session-remove', s.sessionId)"
                                    class="sidebar-btn sidebar-btn-danger opacity-0 group-hover:opacity-100">x</button>
                          </div>
                        </template>
                        <div x-show="g.sessions.length === 0" class="pl-10 pr-3 py-1 text-gray-600 text-xs">No sessions</div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
        <div x-show="managed.length === 0 && managedFolders.length === 0" class="p-4 text-gray-600 text-sm text-center">No sessions</div>
      </div>
    </div>
    <!-- Resize handle -->
    <div x-show="!sidebarCollapsed" @mousedown.prevent="startResize($event)" @touchstart.prevent="startResize($event)"
         @keydown="handleResizeKeydown($event)" tabindex="0"
         role="separator" aria-orientation="vertical" aria-label="Resize sidebar"
         class="w-1 bg-gray-800 hover:bg-gray-700 active:bg-gray-700 cursor-col-resize flex-shrink-0 focus-visible:outline focus-visible:outline-2 focus-visible:outline-blue-500"></div>

    <!-- Add Modal (New / Browse) -->
    <template x-if="addModal">
      <div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50" @click.self="addModal = null" @keydown.escape.window="addModal = null">
        <div class="bg-gray-900 border border-gray-700 rounded-lg w-[560px] max-h-[70vh] flex flex-col overflow-hidden">
          <!-- Tabs -->
          <div class="flex items-center gap-1 px-3 py-2.5 border-b border-gray-800">
            <button @click="addModal.tab = 'browse'"
                    :class="addModal.tab === 'browse' ? 'bg-gray-700 text-gray-100' : 'text-gray-500 hover:text-gray-300 hover:bg-gray-800'"
                    class="px-4 py-1.5 text-sm font-medium rounded">Load Existing</button>
            <button @click="addModal.tab = 'add'"
                    :class="addModal.tab === 'add' ? 'bg-gray-700 text-gray-100' : 'text-gray-500 hover:text-gray-300 hover:bg-gray-800'"
                    class="px-4 py-1.5 text-sm font-medium rounded">New Session</button>
            <span class="flex-1"></span>
            <button @click="addModal = null" class="px-2 py-1 text-gray-600 hover:text-gray-300 text-xs rounded hover:bg-gray-800">x</button>
          </div>
          <!-- Tab: Add -->
          <div x-show="addModal.tab === 'add'" class="p-4 space-y-3 text-sm">
            <label class="text-xs text-gray-400 block">Folder</label>
            <input x-model="newCwd" placeholder="/path/to/project"
                   class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm mono outline-none focus:border-gray-500" />
            <button @click="createNewSession()" :disabled="!newCwd.trim()"
                    class="w-full px-3 py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-500 rounded text-sm">Create</button>
          </div>
          <!-- Tab: Browse -->
          <div x-show="addModal.tab === 'browse'" class="flex flex-col flex-1 min-h-0">
            <div class="px-3 py-2 border-b border-gray-800">
              <input x-model="browseFilter" @input.debounce.500ms="browseOffset = 0; fetchBrowseSessions()" placeholder="Filter by cwd..."
                     class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-1 text-xs mono outline-none" />
            </div>
            <div class="flex-1 overflow-y-auto">
              <div x-show="browseLoading" class="p-4 text-gray-500 text-sm text-center">Loading...</div>
              <template x-for="g in groupedBrowse" :key="g.cwd">
                <div>
                  <div class="px-4 py-2 flex items-center gap-1.5 text-xs text-gray-400 sticky top-0 bg-gray-900 border-b border-gray-800/50">
                    <span @click="browseClickFolder(g)"
                          class="cursor-pointer flex items-center gap-1.5 flex-1 min-w-0 hover:text-gray-200">
                      <span x-text="browseExpanded.has(g.cwd) ? '▾' : '▸'" class="text-gray-600 w-3"></span>
                      <span class="truncate font-medium" x-text="g.cwd"></span>
                      <span class="text-gray-600 flex-shrink-0" x-text="g.sessions.length"></span>
                    </span>
                    <input type="checkbox" :checked="browseCheckedFolders.has(g.cwd) || isManagedFolder(g.cwd, addModal?.nodeId)"
                           :disabled="isManagedFolder(g.cwd, addModal?.nodeId)"
                           @click.stop="if (!isManagedFolder(g.cwd, addModal?.nodeId)) toggleBrowseFolder(g.cwd)"
                           class="w-3.5 h-3.5 rounded border-gray-600 bg-gray-800 flex-shrink-0 cursor-pointer disabled:opacity-50 disabled:cursor-default" title="Add folder" />
                  </div>
                  <template x-if="browseExpanded.has(g.cwd)">
                    <div>
                      <template x-for="s in g.sessions" :key="s.sessionId">
                        <div class="pl-7 pr-4 py-2 flex items-center gap-2 hover:bg-gray-800/50 border-b border-gray-800/30">
                          <div class="flex-1 min-w-0 cursor-pointer" @click="if (!isSessionManaged(s.sessionId)) toggleBrowseSession(s.sessionId)">
                            <div class="text-sm truncate" x-text="s.summary || s.sessionId.slice(0, 12)"></div>
                            <div class="text-xs text-gray-500 mt-0.5" x-text="s.lastModified ? new Date(s.lastModified).toLocaleString() : ''"></div>
                          </div>
                          <input type="checkbox" :checked="browseCheckedSessions.has(s.sessionId) || isSessionManaged(s.sessionId)"
                                 :disabled="isSessionManaged(s.sessionId)"
                                 @click.stop="if (!isSessionManaged(s.sessionId)) toggleBrowseSession(s.sessionId)"
                                 class="w-3.5 h-3.5 rounded border-gray-600 bg-gray-800 flex-shrink-0 cursor-pointer disabled:opacity-50 disabled:cursor-default" />
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
              <div x-show="!browseLoading && browseSessions.length === 0" class="p-4 text-gray-600 text-sm text-center">No sessions found</div>
              <button x-show="browseHasMore" @click="browseOffset += browseLimit; fetchBrowseSessions(true)"
                      class="w-full py-2 text-sm text-gray-500 hover:text-gray-300 hover:bg-gray-800">Load more...</button>
            </div>
            <div x-show="hasChecked" class="p-3 border-t border-gray-800">
              <button @click="addSelected()" class="w-full px-3 py-2 bg-blue-600 hover:bg-blue-500 rounded text-sm">
                Add selected
                (<span x-text="browseCheckedFolders.size + browseCheckedSessions.size"></span>)
              </button>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div><!-- /sidebar -->

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Header -->
    <div class="px-4 py-2 border-b border-gray-800 flex items-center gap-3 text-sm bg-gray-900/50 flex-shrink-0">
      <button @click="toggleSidebar()" class="px-2 py-1 bg-gray-800 hover:bg-gray-700 rounded text-xs flex-shrink-0"
              :title="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
              x-text="sidebarCollapsed ? '☰' : '◧'"></button>
      <template x-if="panelMode">
        <select x-model="selectedNodeId" class="bg-gray-800 text-gray-300 rounded px-2 py-1 text-xs outline-none">
          <template x-for="n in nodes" :key="n.nodeId">
            <option :value="n.nodeId" :disabled="!n.online" x-text="(n.online ? '● ' : '○ ') + (n.label || n.nodeId)"></option>
          </template>
        </select>
      </template>
      <button @click="toggleTheme()" class="px-2 py-1 bg-gray-800 hover:bg-gray-700 rounded text-xs flex-shrink-0"
              :title="theme === 'light' ? 'Switch to dark' : 'Switch to light'" x-text="theme === 'light' ? '☀' : '☾'"></button>
      <span class="text-gray-500">cwd:</span>
      <input x-model="cwd" class="bg-transparent text-gray-300 flex-1 outline-none text-sm mono min-w-0" />
      <select x-model="model" class="bg-gray-800 text-gray-300 rounded px-2 py-1 text-xs outline-none">
        <option value="claude-sonnet-4-6">Sonnet 4.6</option>
        <option value="claude-opus-4-6">Opus 4.6</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
      </select>
      <button x-show="currentId && activeSet.has(currentId)" @click="changeModel()"
              class="text-xs px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded">Apply Model</button>
    </div>

    <!-- Messages -->
    <div x-data="messages" class="flex-1 overflow-y-auto overflow-x-hidden p-4 mono text-sm space-y-1">
      <div x-ref="rendered"></div>
      <template x-for="(block, i) in streaming.blocks" :key="'sb'+i">
        <div>
          <template x-if="block.type === 'text'">
            <div class="message-row message-assistant py-1"><div class="message-content assistant-message md-content" x-html="R.renderMd(block.text)"></div></div>
          </template>
          <template x-if="block.type === 'tool_use'">
            <div class="tool-line text-xs py-0.5" x-html="R.renderToolUse(block.name, block.input)"></div>
          </template>
        </div>
      </template>
      <div x-show="streaming._toolName" class="text-xs py-0.5">
        <span class="tool-kind font-semibold" x-text="streaming._toolName"></span>
        <span class="tool-meta animate-pulse">...</span>
      </div>
      <div x-show="streaming.text" class="message-row message-assistant py-1">
        <div class="message-content assistant-message md-content"><span x-html="R.renderMd(streaming.text)"></span><span class="cursor-blink tool-meta">|</span></div>
      </div>
      <div x-show="$store.active && !streaming.text && streaming.blocks.length === 0 && !streaming._toolName" class="text-gray-600 text-xs py-1">
        <span class="animate-pulse">thinking...</span>
      </div>
    </div>

    <!-- Input -->
    <div class="p-3 border-t border-gray-800 bg-gray-900/30 flex-shrink-0">
      <div class="flex gap-2">
        <input x-model="inputText" @keydown.enter.prevent="send()"
               :placeholder="currentId ? 'Send a message...' : 'Start a new session...'"
               class="flex-1 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm mono outline-none focus:border-gray-500 min-w-0" />
        <button @click="send()" :disabled="!inputText.trim()"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-500 rounded text-sm">Send</button>
        <button x-show="currentId && activeSet.has(currentId)" @click="interruptSession()"
                class="px-3 py-2 bg-red-700 hover:bg-red-600 rounded text-sm">Stop</button>
      </div>
    </div>

    <!-- Status -->
    <div class="px-4 py-1 border-t border-gray-800 text-xs text-gray-600 flex gap-4 flex-shrink-0">
      <span x-text="'cost: $' + totalCost.toFixed(4)"></span>
      <span x-text="'in: ' + totalIn + ' out: ' + totalOut"></span>
      <span x-text="currentId || 'no session'"></span>
      <span x-show="currentId && activeSet.has(currentId)" class="text-green-400">active</span>
    </div>
  </div>

</div>

</body>
</html>
