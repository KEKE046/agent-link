<!--
  Agent Link — 前端模块结构
  ═══════════════════════════════════════════════════
  index.html     本文件，HTML 骨架 + Alpine 模板
  app.js         核心状态、session 生命周期、SSE、send/switch/interrupt
  sidebar.js     侧边栏：分组、展开折叠、Load 弹窗、节点管理
  vscode-ui.js   VSCode 弹窗：启动/停止/安装
  renderer.js    消息渲染组件 + Alpine messages 组件

  组件通信：
    emit(name, detail) → window CustomEvent，所有组件统一用
    sidebar/vscode → app:  session-switch, session-new, session-remove, session-add, data-refresh
    sidebar → vscode:      vscode-open, vscode-stop
    app → sidebar:         通过响应式状态 (currentId, managed, activeSet, nodes, vscodeActive)
    sidebar 自动展开:       $watch('currentId')

  样式：tailwind.input.css → styles.css (bunx @tailwindcss/cli 编译)

  改动须知：
    - 改模板时同步检查对应 JS 的 emit/状态引用
    - 改 JS 事件名时全局搜索 emit('xxx') 和 @xxx.window
    - 加新 public 文件时更新 src/assets.ts
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Link</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/renderer.js"></script>
  <script src="/app.js"></script>
  <script src="/sidebar.js"></script>
  <script src="/vscode-ui.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 h-screen overflow-hidden">

<div x-data="app()" x-cloak class="flex h-screen"
     @session-switch.window="switchSession($event.detail)"
     @session-new.window="newSession()"
     @session-remove.window="removeManaged($event.detail)"
     @session-add.window="addManaged($event.detail)"
     @data-refresh.window="refreshData()">

  <!-- Sidebar -->
  <div x-data="sidebar()" class="flex flex-shrink-0">
    <div class="bg-gray-900 flex flex-col flex-shrink-0 overflow-hidden transition-[width] duration-200"
         :style="`width: ${sidebarCollapsed ? 0 : sidebarWidth}px`"
         :class="sidebarCollapsed ? '' : 'border-r border-gray-800'">
      <div class="p-3 border-b border-gray-800 flex gap-2">
        <button @click="emit('session-new')" class="flex-1 px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded text-sm">+ New</button>
        <button @click="loadSessions()" class="flex-1 px-3 py-1.5 bg-gray-800 hover:bg-gray-700 rounded text-sm">Load</button>
      </div>
      <div class="flex-1 overflow-y-auto">
        <!-- Unified session list: works for both panel and standalone mode -->
        <template x-for="n in groupedSessions" :key="n.nodeId">
          <div>
            <!-- Node header -->
            <div @click="toggleGroup('node:' + n.nodeId)"
                 class="px-3 py-2 flex items-center gap-1.5 cursor-pointer hover:bg-gray-800/50 text-xs text-gray-300 sticky top-0 bg-gray-900 border-b border-gray-800/50 z-10">
              <span x-text="expandedGroups.has('node:' + n.nodeId) ? '▾' : '▸'" class="text-gray-600 w-3"></span>
              <span class="w-2 h-2 rounded-full flex-shrink-0" :class="isNodeOnline(n.nodeId) ? 'bg-green-400' : 'bg-gray-600'"></span>
              <button @click.stop="renameNodePrompt(n)" class="truncate flex-1 font-semibold text-left hover:text-blue-300" x-text="n.label || n.nodeId"></button>
              <button x-show="!n.approved" @click.stop="approveNode(n.nodeId)" title="Approve node"
                      class="px-1 py-0.5 rounded text-[10px] text-green-300 hover:bg-green-900/30">✓</button>
              <span x-show="!n.approved" class="text-[10px] text-yellow-400">pending</span>
            </div>
            <!-- CWD groups -->
            <template x-if="expandedGroups.has('node:' + n.nodeId)">
              <div>
                <template x-for="g in n.cwdGroups" :key="n.nodeId + ':' + g.cwd">
                  <div>
                    <div @click="toggleGroup(n.nodeId + ':' + g.cwd)"
                         class="px-5 py-1.5 flex items-center gap-1.5 cursor-pointer hover:bg-gray-800/50 text-xs text-gray-400 sticky bg-gray-900 border-b border-gray-800/30" style="top:1.75rem">
                      <span x-text="expandedGroups.has(n.nodeId + ':' + g.cwd) ? '▾' : '▸'" class="text-gray-600 w-3"></span>
                      <span class="truncate flex-1 font-medium" x-text="g.cwd"></span>
                      <a x-show="isVscodeActive(g.cwd, n.nodeId)" @click.stop
                         :href="vscodeUrl(g.cwd, n.nodeId)" target="_blank" rel="noopener"
                         title="Open VSCode" class="px-1.5 py-0.5 rounded hover:bg-gray-700 text-[11px] text-blue-300 no-underline">VS</a>
                      <button x-show="!isVscodeActive(g.cwd, n.nodeId)"
                              @click.stop="emit('vscode-open', {cwd: g.cwd, nodeId: n.nodeId})"
                              title="Start VSCode" class="px-1.5 py-0.5 rounded hover:bg-gray-700 text-[11px] text-gray-500 hover:text-gray-300">VS</button>
                      <button x-show="isVscodeActive(g.cwd, n.nodeId)"
                              @click.stop="emit('vscode-stop', {cwd: g.cwd, nodeId: n.nodeId})"
                              title="Stop VSCode" class="px-1 py-0.5 rounded text-[10px] text-red-300 hover:bg-red-900/30">Stop</button>
                      <span class="text-gray-600" x-text="g.sessions.length"></span>
                    </div>
                    <template x-if="expandedGroups.has(n.nodeId + ':' + g.cwd)">
                      <div>
                        <template x-for="s in g.sessions" :key="s.sessionId">
                          <div @click="emit('session-switch', s.sessionId)"
                               :class="currentId === s.sessionId ? 'bg-gray-800 border-l-2 border-blue-400' : 'border-l-2 border-transparent'"
                               class="pl-8 pr-3 py-2 cursor-pointer hover:bg-gray-800/50 relative group"
                               :style="!isNodeOnline(n.nodeId) ? 'opacity:0.5' : ''">
                            <div class="flex items-center gap-2">
                              <span class="w-2 h-2 rounded-full flex-shrink-0" :class="activeSet.has(s.sessionId) ? 'bg-green-400 animate-pulse' : 'bg-gray-600'"></span>
                              <span class="text-sm truncate" x-text="s.label || s.sessionId.slice(0, 8)"></span>
                            </div>
                            <button @click.stop="emit('session-remove', s.sessionId)"
                                    class="absolute right-2 top-1.5 text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 text-xs">x</button>
                          </div>
                        </template>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
        <div x-show="managed.length === 0" class="p-4 text-gray-600 text-sm text-center">No sessions</div>
      </div>
    </div>
    <!-- Resize handle -->
    <div x-show="!sidebarCollapsed" @mousedown.prevent="startResize($event)" @touchstart.prevent="startResize($event)"
         @keydown="handleResizeKeydown($event)" tabindex="0"
         role="separator" aria-orientation="vertical" aria-label="Resize sidebar"
         class="w-1 bg-gray-800 hover:bg-gray-700 active:bg-gray-700 cursor-col-resize flex-shrink-0 focus-visible:outline focus-visible:outline-2 focus-visible:outline-blue-500"></div>

    <!-- Load Sessions Modal -->
    <div x-show="showLoadModal" x-cloak class="fixed inset-0 bg-black/60 flex items-center justify-center z-50" @click.self="showLoadModal = false">
      <div class="bg-gray-900 border border-gray-700 rounded-lg w-[600px] max-h-[70vh] flex flex-col">
        <div class="p-4 border-b border-gray-800 flex justify-between items-center">
          <h3 class="text-sm font-semibold">Load Existing Session</h3>
          <button @click="showLoadModal = false" class="text-gray-500 hover:text-gray-300">x</button>
        </div>
        <div class="p-3 border-b border-gray-800">
          <input x-model="browseCwd" @input.debounce.500ms="fetchBrowseSessions()" placeholder="Filter by cwd..."
                 class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm mono outline-none" />
        </div>
        <div class="flex-1 overflow-y-auto">
          <div x-show="browseLoading" class="p-4 text-gray-500 text-sm text-center">Loading...</div>
          <template x-for="g in groupedBrowse" :key="g.cwd">
            <div>
              <div @click="browseExpanded.has(g.cwd) ? browseExpanded.delete(g.cwd) : browseExpanded.add(g.cwd); browseExpanded = new Set(browseExpanded)"
                   class="px-4 py-2 flex items-center gap-1.5 cursor-pointer hover:bg-gray-800/50 text-xs text-gray-400 sticky top-0 bg-gray-900 border-b border-gray-800/50">
                <span x-text="browseExpanded.has(g.cwd) ? '▾' : '▸'" class="text-gray-600 w-3"></span>
                <span class="truncate flex-1 font-medium" x-text="g.cwd"></span>
                <span class="text-gray-600" x-text="g.sessions.length"></span>
              </div>
              <template x-if="browseExpanded.has(g.cwd)">
                <div>
                  <template x-for="s in g.sessions" :key="s.sessionId">
                    <div @click="addToManaged(s)" class="pl-7 pr-4 py-2 hover:bg-gray-800 cursor-pointer border-b border-gray-800/50">
                      <div class="text-sm truncate" x-text="s.summary || s.sessionId.slice(0, 12)"></div>
                      <div class="text-xs text-gray-500 mt-0.5" x-text="s.lastModified ? new Date(s.lastModified).toLocaleString() : ''"></div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
          <div x-show="!browseLoading && browseSessions.length === 0" class="p-4 text-gray-600 text-sm text-center">No sessions found</div>
          <button x-show="browseHasMore" @click="browseOffset += browseLimit; fetchBrowseSessions(true)"
                  class="w-full py-2 text-sm text-gray-500 hover:text-gray-300 hover:bg-gray-800">Load more...</button>
        </div>
      </div>
    </div>

    <!-- Rename node modal -->
    <template x-if="renameModal">
      <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50" @click.self="renameModal = null" @keydown.escape.window="renameModal = null">
        <div class="bg-gray-800 rounded-lg shadow-xl p-4 w-72">
          <div class="text-sm text-gray-300 mb-2">Rename node</div>
          <input x-ref="renameInput" x-model="renameModal.label" @keydown.enter="renameNodeSubmit()" @keydown.escape="renameModal = null"
                 class="w-full bg-gray-900 text-gray-100 rounded px-3 py-1.5 text-sm outline-none border border-gray-600 focus:border-blue-500" />
          <div class="flex justify-end gap-2 mt-3">
            <button @click="renameModal = null" class="px-3 py-1 rounded text-xs text-gray-400 hover:bg-gray-700">Cancel</button>
            <button @click="renameNodeSubmit()" class="px-3 py-1 rounded text-xs bg-blue-600 hover:bg-blue-500 text-white">Save</button>
          </div>
        </div>
      </div>
    </template>
  </div><!-- /sidebar -->

  <!-- VSCode Modal -->
  <div x-data="vscodeUi()" @vscode-stop.window="stop($event.detail.cwd, $event.detail.nodeId)">
    <div x-show="show" x-cloak class="fixed inset-0 bg-black/60 flex items-center justify-center z-50" @click.self="show = false">
      <div class="bg-gray-900 border border-gray-700 rounded-lg w-[560px] max-h-[70vh] flex flex-col">
        <div class="p-4 border-b border-gray-800 flex justify-between items-center">
          <h3 class="text-sm font-semibold">Start VSCode Server</h3>
          <button @click="show = false" class="text-gray-500 hover:text-gray-300">x</button>
        </div>
        <div class="px-4 pt-3 border-b border-gray-800 flex gap-2 text-xs">
          <button @click="tab = 'start'" :class="tab === 'start' ? 'bg-gray-700 text-gray-100' : 'bg-gray-800 text-gray-400 hover:text-gray-200'" class="px-3 py-1.5 rounded-t">启动</button>
          <button @click="tab = 'install'" :class="tab === 'install' ? 'bg-gray-700 text-gray-100' : 'bg-gray-800 text-gray-400 hover:text-gray-200'" class="px-3 py-1.5 rounded-t">安装</button>
        </div>
        <div class="p-4 space-y-3 text-sm overflow-y-auto">
          <div class="text-gray-400">cwd: <span class="mono text-gray-200" x-text="targetCwd"></span></div>
          <div x-show="loading" class="text-gray-500">Loading...</div>
          <div x-show="tab === 'start'" class="space-y-3">
            <label class="text-xs text-gray-400 block">Version</label>
            <select x-model="selectedCommit" :disabled="versions.length === 0"
                    class="w-full bg-gray-800 text-gray-300 rounded px-2 py-2 text-sm outline-none disabled:opacity-60">
              <template x-for="v in versions" :key="v.commit">
                <option :value="v.commit" x-text="`${v.version} (${v.commit.slice(0, 12)})`"></option>
              </template>
            </select>
            <div x-show="versions.length === 0" class="text-yellow-400 text-xs">请先在「安装」页安装</div>
            <button @click="start()" :disabled="!selectedCommit || versions.length === 0 || loading" x-show="!startedUrl"
                    class="w-full px-3 py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-500 rounded text-sm">Start</button>
            <a x-show="startedUrl" :href="startedUrl" target="_blank" rel="noopener" @click="show = false"
               class="block w-full px-3 py-2 bg-green-600 hover:bg-green-500 rounded text-sm text-center no-underline text-white">Open VSCode</a>
          </div>
          <div x-show="tab === 'install'" class="space-y-3">
            <label class="text-xs text-gray-400 block">VS Code version</label>
            <input x-model="installVersion" @input.debounce.400ms="fetchInstallInfo()" placeholder="1.112.0"
                   class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm mono outline-none" />
            <label class="text-xs text-gray-400 block">Prompt (copy to Agent Link session)</label>
            <textarea readonly class="w-full h-24 bg-gray-800 border border-gray-700 rounded p-2 text-xs mono text-gray-300" x-text="install?.prompt || ''"></textarea>
            <label class="text-xs text-gray-400 block">Install script</label>
            <textarea readonly class="w-full h-40 bg-gray-800 border border-gray-700 rounded p-2 text-xs mono text-gray-300" x-text="install?.script || ''"></textarea>
            <label class="text-xs text-gray-400 block">Install command</label>
            <textarea readonly class="w-full h-20 bg-gray-800 border border-gray-700 rounded p-2 text-xs mono text-gray-300" x-text="install?.command || ''"></textarea>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Header -->
    <div class="px-4 py-2 border-b border-gray-800 flex items-center gap-3 text-sm bg-gray-900/50 flex-shrink-0">
      <button @click="toggleSidebar()" class="px-2 py-1 bg-gray-800 hover:bg-gray-700 rounded text-xs flex-shrink-0"
              :title="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
              x-text="sidebarCollapsed ? '☰' : '◧'"></button>
      <template x-if="panelMode">
        <div class="flex items-center gap-2">
          <select x-model="selectedNodeId" class="bg-gray-800 text-gray-300 rounded px-2 py-1 text-xs outline-none">
            <template x-for="n in nodes" :key="n.nodeId">
              <option :value="n.nodeId" :disabled="!n.online || !n.approved" x-text="(n.online ? '● ' : '○ ') + (n.label || n.nodeId) + (n.approved ? '' : ' (pending)')"></option>
            </template>
          </select>
          <input x-model="panelAdminSecret" type="password" placeholder="admin secret"
                 class="bg-gray-800 text-gray-300 rounded px-2 py-1 text-xs outline-none w-28" />
        </div>
      </template>
      <button @click="toggleTheme()" class="px-2 py-1 bg-gray-800 hover:bg-gray-700 rounded text-xs flex-shrink-0"
              :title="theme === 'light' ? 'Switch to dark' : 'Switch to light'" x-text="theme === 'light' ? '☀' : '☾'"></button>
      <span class="text-gray-500">cwd:</span>
      <input x-model="cwd" class="bg-transparent text-gray-300 flex-1 outline-none text-sm mono min-w-0" />
      <select x-model="model" class="bg-gray-800 text-gray-300 rounded px-2 py-1 text-xs outline-none">
        <option value="claude-sonnet-4-6">Sonnet 4.6</option>
        <option value="claude-opus-4-6">Opus 4.6</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
      </select>
      <button x-show="currentId && activeSet.has(currentId)" @click="changeModel()"
              class="text-xs px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded">Apply Model</button>
    </div>

    <!-- Messages -->
    <div x-data="messages" class="flex-1 overflow-y-auto overflow-x-hidden p-4 mono text-sm space-y-1">
      <div x-ref="rendered"></div>
      <template x-for="(block, i) in streaming.blocks" :key="'sb'+i">
        <div>
          <template x-if="block.type === 'text'">
            <div class="message-row message-assistant py-1"><div class="message-content assistant-message md-content" x-html="R.renderMd(block.text)"></div></div>
          </template>
          <template x-if="block.type === 'tool_use'">
            <div class="tool-line text-xs py-0.5" x-html="R.renderToolUse(block.name, block.input)"></div>
          </template>
        </div>
      </template>
      <div x-show="streaming._toolName" class="text-xs py-0.5">
        <span class="tool-kind font-semibold" x-text="streaming._toolName"></span>
        <span class="tool-meta animate-pulse">...</span>
      </div>
      <div x-show="streaming.text" class="message-row message-assistant py-1">
        <div class="message-content assistant-message md-content"><span x-html="R.renderMd(streaming.text)"></span><span class="cursor-blink tool-meta">|</span></div>
      </div>
      <div x-show="$store.active && !streaming.text && streaming.blocks.length === 0 && !streaming._toolName" class="text-gray-600 text-xs py-1">
        <span class="animate-pulse">thinking...</span>
      </div>
    </div>

    <!-- Input -->
    <div class="p-3 border-t border-gray-800 bg-gray-900/30 flex-shrink-0">
      <div class="flex gap-2">
        <input x-model="inputText" @keydown.enter.prevent="send()"
               :placeholder="currentId ? 'Send a message...' : 'Start a new session...'"
               class="flex-1 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm mono outline-none focus:border-gray-500 min-w-0" />
        <button @click="send()" :disabled="!inputText.trim()"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-500 rounded text-sm">Send</button>
        <button x-show="currentId && activeSet.has(currentId)" @click="interruptSession()"
                class="px-3 py-2 bg-red-700 hover:bg-red-600 rounded text-sm">Stop</button>
      </div>
    </div>

    <!-- Status -->
    <div class="px-4 py-1 border-t border-gray-800 text-xs text-gray-600 flex gap-4 flex-shrink-0">
      <span x-text="'cost: $' + totalCost.toFixed(4)"></span>
      <span x-text="'in: ' + totalIn + ' out: ' + totalOut"></span>
      <span x-text="currentId || 'no session'"></span>
      <span x-show="currentId && activeSet.has(currentId)" class="text-green-400">active</span>
    </div>
  </div>

</div>

</body>
</html>
