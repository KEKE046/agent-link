<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Link</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/renderer.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; }
    ::-webkit-scrollbar { width: 6px; height: 0; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    .cursor-blink { animation: blink 1s step-end infinite; }
    /* Markdown styles */
    .md-content p { margin: 0.25rem 0; }
    .md-content pre { background: #1a1a2e; border-radius: 0.375rem; padding: 0.75rem; margin: 0.5rem 0; overflow-x: auto; }
    .md-content code { font-family: inherit; font-size: 0.85em; }
    .md-content :not(pre) > code { background: #1a1a2e; padding: 0.1em 0.35em; border-radius: 0.25rem; }
    .md-content ul, .md-content ol { padding-left: 1.5em; margin: 0.25rem 0; }
    .md-content ul { list-style: disc; }
    .md-content ol { list-style: decimal; }
    .md-content li { margin: 0.1rem 0; }
    .md-content table { border-collapse: collapse; margin: 0.5rem 0; }
    .md-content th, .md-content td { border: 1px solid #374151; padding: 0.25rem 0.5rem; text-align: left; }
    .md-content th { background: #1f2937; }
    .md-content blockquote { border-left: 3px solid #374151; padding-left: 0.75rem; color: #9ca3af; margin: 0.25rem 0; }
    .md-content h1, .md-content h2, .md-content h3 { font-weight: 600; margin: 0.5rem 0 0.25rem; }
    .md-content h1 { font-size: 1.25em; }
    .md-content h2 { font-size: 1.1em; }
    .md-content h3 { font-size: 1em; }
    .md-content a { color: #60a5fa; text-decoration: underline; }
    .md-content hr { border-color: #374151; margin: 0.5rem 0; }
    /* Collapsible tool details */
    .tool-details > summary { list-style: none; }
    .tool-details > summary::-webkit-details-marker { display: none; }
    .tool-details > summary::before { content: '▸ '; font-size: 0.75em; color: #4b5563; }
    .tool-details[open] > summary::before { content: '▾ '; }
    /* Prevent horizontal overflow */
    .tool-line { overflow-wrap: anywhere; }
    .tool-item { overflow: hidden; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen overflow-hidden">

<div x-data="app()" x-cloak class="flex h-screen">

  <!-- Sidebar -->
  <div class="bg-gray-900 flex flex-col flex-shrink-0 overflow-hidden transition-[width] duration-200"
       :style="`width: ${sidebarCollapsed ? 0 : sidebarWidth}px`"
       :class="sidebarCollapsed ? '' : 'border-r border-gray-800'">
    <div class="p-3 border-b border-gray-800 flex gap-2">
      <button @click="newSession()" class="flex-1 px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded text-sm">+ New</button>
      <button @click="loadSessions()" class="flex-1 px-3 py-1.5 bg-gray-800 hover:bg-gray-700 rounded text-sm">Load</button>
    </div>
    <div class="flex-1 overflow-y-auto">
      <!-- Panel mode: group by node then cwd -->
      <template x-if="panelMode">
        <div>
          <template x-for="n in groupedByNode" :key="n.nodeId">
            <div>
              <div @click="toggleGroup('node:' + n.nodeId)"
                   class="px-3 py-2 flex items-center gap-1.5 cursor-pointer hover:bg-gray-800/50 text-xs text-gray-300 sticky top-0 bg-gray-900 border-b border-gray-800/50 z-10">
                <span x-text="expandedGroups.has('node:' + n.nodeId) ? '▾' : '▸'" class="text-gray-600 w-3"></span>
                <span class="w-2 h-2 rounded-full flex-shrink-0" :class="isNodeOnline(n.nodeId) ? 'bg-green-400' : 'bg-gray-600'"></span>
                <span class="truncate flex-1 font-semibold" x-text="n.label || n.nodeId"></span>
              </div>
              <template x-if="expandedGroups.has('node:' + n.nodeId)">
                <div>
                  <template x-for="g in n.cwdGroups" :key="n.nodeId + ':' + g.cwd">
                    <div>
                      <div @click="toggleGroup(n.nodeId + ':' + g.cwd)"
                           class="px-5 py-1.5 flex items-center gap-1.5 cursor-pointer hover:bg-gray-800/50 text-xs text-gray-400 sticky top-7 bg-gray-900 border-b border-gray-800/30">
                        <span x-text="expandedGroups.has(n.nodeId + ':' + g.cwd) ? '▾' : '▸'" class="text-gray-600 w-3"></span>
                        <span class="truncate flex-1 font-medium" x-text="g.cwd"></span>
                        <a x-show="isVscodeActive(g.cwd, n.nodeId)"
                          @click.stop
                          :href="vscodeUrl(g.cwd, n.nodeId)" target="_blank" rel="noopener"
                          title="Open VSCode"
                          class="px-1.5 py-0.5 rounded hover:bg-gray-700 text-[11px] text-blue-300 no-underline">VS</a>
                        <button x-show="!isVscodeActive(g.cwd, n.nodeId)"
                          @click.stop="openVscode(g.cwd, n.nodeId)"
                          title="Start VSCode"
                          class="px-1.5 py-0.5 rounded hover:bg-gray-700 text-[11px] text-gray-500 hover:text-gray-300">VS</button>
                        <button x-show="isVscodeActive(g.cwd, n.nodeId)"
                                @click.stop="stopVscode(g.cwd, n.nodeId)"
                                title="Stop VSCode"
                                class="px-1 py-0.5 rounded text-[10px] text-red-300 hover:bg-red-900/30">Stop</button>
                        <span class="text-gray-600" x-text="g.sessions.length"></span>
                      </div>
                      <template x-if="expandedGroups.has(n.nodeId + ':' + g.cwd)">
                        <div>
                          <template x-for="s in g.sessions" :key="s.sessionId">
                            <div @click="switchSession(s.sessionId)"
                                 :class="currentId === s.sessionId ? 'bg-gray-800 border-l-2 border-blue-400' : 'border-l-2 border-transparent'"
                                 class="pl-8 pr-3 py-2 cursor-pointer hover:bg-gray-800/50 relative group"
                                 :style="isNodeOnline(n.nodeId) ? '' : 'opacity: 0.5'">
                              <div class="flex items-center gap-2">
                                <span x-show="activeSet.has(s.sessionId)" class="w-2 h-2 rounded-full bg-green-400 flex-shrink-0 animate-pulse"></span>
                                <span x-show="!activeSet.has(s.sessionId)" class="w-2 h-2 rounded-full bg-gray-600 flex-shrink-0"></span>
                                <span class="text-sm truncate" x-text="s.label || s.sessionId.slice(0, 8)"></span>
                              </div>
                              <button @click.stop="removeManaged(s.sessionId)"
                                      class="absolute right-2 top-1.5 text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 text-xs">x</button>
                            </div>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>
      <!-- Standalone mode: group by cwd only (original) -->
      <template x-if="!panelMode">
        <div>
          <template x-for="g in groupedManaged" :key="g.cwd">
            <div>
              <div @click="toggleGroup(g.cwd)"
                   class="px-3 py-2 flex items-center gap-1.5 cursor-pointer hover:bg-gray-800/50 text-xs text-gray-400 sticky top-0 bg-gray-900 border-b border-gray-800/50">
                <span x-text="expandedGroups.has(g.cwd) ? '▾' : '▸'" class="text-gray-600 w-3"></span>
                <span class="truncate flex-1 font-medium" x-text="g.cwd"></span>
                <a x-show="isVscodeActive(g.cwd)"
                  @click.stop
                  :href="vscodeUrl(g.cwd)" target="_blank" rel="noopener"
                  title="Open VSCode"
                  class="px-1.5 py-0.5 rounded hover:bg-gray-700 text-[11px] text-blue-300 no-underline">VS</a>
                <button x-show="!isVscodeActive(g.cwd)"
                  @click.stop="openVscode(g.cwd)"
                  title="Start VSCode"
                  class="px-1.5 py-0.5 rounded hover:bg-gray-700 text-[11px] text-gray-500 hover:text-gray-300">VS</button>
                <button x-show="isVscodeActive(g.cwd)"
                        @click.stop="stopVscode(g.cwd)"
                        aria-label="Stop VSCode server"
                        title="Stop VSCode"
                        class="px-1 py-0.5 rounded text-[10px] text-red-300 hover:bg-red-900/30">Stop</button>
                <span class="text-gray-600" x-text="g.sessions.length"></span>
              </div>
              <template x-if="expandedGroups.has(g.cwd)">
                <div>
                  <template x-for="s in g.sessions" :key="s.sessionId">
                    <div @click="switchSession(s.sessionId)"
                         :class="currentId === s.sessionId ? 'bg-gray-800 border-l-2 border-blue-400' : 'border-l-2 border-transparent'"
                         class="pl-5 pr-3 py-2 cursor-pointer hover:bg-gray-800/50 relative group">
                      <div class="flex items-center gap-2">
                        <span x-show="activeSet.has(s.sessionId)" class="w-2 h-2 rounded-full bg-green-400 flex-shrink-0" :class="activeSet.has(s.sessionId) && 'animate-pulse'"></span>
                        <span x-show="!activeSet.has(s.sessionId)" class="w-2 h-2 rounded-full bg-gray-600 flex-shrink-0"></span>
                        <span class="text-sm truncate" x-text="s.label || s.sessionId.slice(0, 8)"></span>
                      </div>
                      <button @click.stop="removeManaged(s.sessionId)"
                              class="absolute right-2 top-1.5 text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 text-xs">x</button>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>
      <div x-show="managed.length === 0" class="p-4 text-gray-600 text-sm text-center">No sessions</div>
    </div>
  </div>
  <div x-show="!sidebarCollapsed" @mousedown.prevent="startResize($event)" @touchstart.prevent="startResize($event)"
       @keydown="handleResizeKeydown($event)"
       tabindex="0"
       role="separator" aria-orientation="vertical" aria-label="Resize sidebar"
       class="w-1 bg-gray-800 hover:bg-gray-700 active:bg-gray-700 cursor-col-resize flex-shrink-0 focus-visible:outline focus-visible:outline-2 focus-visible:outline-blue-500"></div>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0">

    <!-- Header bar -->
    <div class="px-4 py-2 border-b border-gray-800 flex items-center gap-3 text-sm bg-gray-900/50 flex-shrink-0">
      <button @click="toggleSidebar()"
              class="px-2 py-1 bg-gray-800 hover:bg-gray-700 rounded text-xs flex-shrink-0 focus-visible:outline focus-visible:outline-2 focus-visible:outline-blue-500"
              :aria-label="sidebarToggleLabel()"
              :aria-expanded="String(!sidebarCollapsed)"
              :title="sidebarToggleLabel()"
              x-text="sidebarCollapsed ? '☰' : '◧'"></button>
      <template x-if="panelMode">
        <select x-model="selectedNodeId" class="bg-gray-800 text-gray-300 rounded px-2 py-1 text-xs outline-none">
          <template x-for="n in nodes" :key="n.nodeId">
            <option :value="n.nodeId" :disabled="!n.online" x-text="(n.online ? '● ' : '○ ') + (n.label || n.nodeId)"></option>
          </template>
        </select>
      </template>
      <span class="text-gray-500">cwd:</span>
      <input x-model="cwd" class="bg-transparent text-gray-300 flex-1 outline-none text-sm mono min-w-0" />
      <select x-model="model" class="bg-gray-800 text-gray-300 rounded px-2 py-1 text-xs outline-none">
        <option value="claude-sonnet-4-6">Sonnet 4.6</option>
        <option value="claude-opus-4-6">Opus 4.6</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
      </select>
      <button x-show="currentId && activeSet.has(currentId)" @click="changeModel()"
              class="text-xs px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded">Apply Model</button>
    </div>

    <!-- Messages area (Alpine component) -->
    <div x-data="messages"
         class="flex-1 overflow-y-auto overflow-x-hidden p-4 mono text-sm space-y-1">
      <div x-ref="rendered"></div>

      <!-- Streaming blocks (finalized parts of current response) -->
      <template x-for="(block, i) in streaming.blocks" :key="'sb'+i">
        <div>
          <template x-if="block.type === 'text'">
            <div class="text-gray-200 md-content" x-html="R.renderMd(block.text)"></div>
          </template>
          <template x-if="block.type === 'tool_use'">
            <div class="tool-line text-xs py-0.5" x-html="R.renderToolUse(block.name, block.input)"></div>
          </template>
        </div>
      </template>

      <!-- Active tool being streamed -->
      <div x-show="streaming._toolName" class="text-xs py-0.5">
        <span class="text-yellow-500/80 font-semibold" x-text="streaming._toolName"></span>
        <span class="text-gray-600 animate-pulse">...</span>
      </div>

      <!-- Streaming text (live typing) -->
      <div x-show="streaming.text" class="text-gray-200 md-content">
        <span x-html="R.renderMd(streaming.text)"></span><span class="cursor-blink text-gray-500">|</span>
      </div>

      <!-- Thinking indicator -->
      <div x-show="$store.active && !streaming.text && streaming.blocks.length === 0 && !streaming._toolName"
           class="text-gray-600 text-xs py-1">
        <span class="animate-pulse">thinking...</span>
      </div>
    </div>

    <!-- Input area -->
    <div class="p-3 border-t border-gray-800 bg-gray-900/30 flex-shrink-0">
      <div class="flex gap-2">
        <input x-model="inputText"
               @keydown.enter.prevent="send()"
               :placeholder="currentId ? 'Send a message...' : 'Start a new session...'"
               class="flex-1 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm mono outline-none focus:border-gray-500 min-w-0" />
        <button @click="send()"
                :disabled="!inputText.trim()"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-500 rounded text-sm">Send</button>
        <button x-show="currentId && activeSet.has(currentId)"
                @click="interruptSession()"
                class="px-3 py-2 bg-red-700 hover:bg-red-600 rounded text-sm">Stop</button>
      </div>
    </div>

    <!-- Status bar -->
    <div class="px-4 py-1 border-t border-gray-800 text-xs text-gray-600 flex gap-4 flex-shrink-0">
      <span x-text="'cost: $' + totalCost.toFixed(4)"></span>
      <span x-text="'in: ' + totalIn + ' out: ' + totalOut"></span>
      <span x-text="currentId || 'no session'"></span>
      <span x-show="currentId && activeSet.has(currentId)" class="text-green-400">active</span>
    </div>
  </div>

  <!-- Load Sessions Modal -->
  <div x-show="showLoadModal" x-cloak
       class="fixed inset-0 bg-black/60 flex items-center justify-center z-50"
       @click.self="showLoadModal = false">
    <div class="bg-gray-900 border border-gray-700 rounded-lg w-[600px] max-h-[70vh] flex flex-col">
      <div class="p-4 border-b border-gray-800 flex justify-between items-center">
        <h3 class="text-sm font-semibold">Load Existing Session</h3>
        <button @click="showLoadModal = false" class="text-gray-500 hover:text-gray-300">x</button>
      </div>
      <div class="p-3 border-b border-gray-800">
        <input x-model="browseCwd" @input.debounce.500ms="fetchBrowseSessions()"
               placeholder="Filter by cwd..."
               class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm mono outline-none" />
      </div>
      <div class="flex-1 overflow-y-auto">
        <div x-show="browseLoading" class="p-4 text-gray-500 text-sm text-center">Loading...</div>
        <template x-for="g in groupedBrowse" :key="g.cwd">
          <div>
            <div @click="browseExpanded.has(g.cwd) ? browseExpanded.delete(g.cwd) : browseExpanded.add(g.cwd); browseExpanded = new Set(browseExpanded)"
                 class="px-4 py-2 flex items-center gap-1.5 cursor-pointer hover:bg-gray-800/50 text-xs text-gray-400 sticky top-0 bg-gray-900 border-b border-gray-800/50">
              <span x-text="browseExpanded.has(g.cwd) ? '▾' : '▸'" class="text-gray-600 w-3"></span>
              <span class="truncate flex-1 font-medium" x-text="g.cwd"></span>
              <span class="text-gray-600" x-text="g.sessions.length"></span>
            </div>
            <template x-if="browseExpanded.has(g.cwd)">
              <div>
                <template x-for="s in g.sessions" :key="s.sessionId">
                  <div @click="addToManaged(s)"
                       class="pl-7 pr-4 py-2 hover:bg-gray-800 cursor-pointer border-b border-gray-800/50">
                    <div class="text-sm truncate" x-text="s.summary || s.sessionId.slice(0, 12)"></div>
                    <div class="text-xs text-gray-500 mt-0.5" x-text="s.lastModified ? new Date(s.lastModified).toLocaleString() : ''"></div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
        <div x-show="!browseLoading && browseSessions.length === 0" class="p-4 text-gray-600 text-sm text-center">
          No sessions found
        </div>
        <button x-show="browseHasMore"
                @click="browseOffset += browseLimit; fetchBrowseSessions(true)"
                class="w-full py-2 text-sm text-gray-500 hover:text-gray-300 hover:bg-gray-800">Load more...</button>
      </div>
    </div>
  </div>

  <!-- VSCode Modal -->
  <div x-show="showVscodeModal" x-cloak
       class="fixed inset-0 bg-black/60 flex items-center justify-center z-50"
       @click.self="showVscodeModal = false">
    <div class="bg-gray-900 border border-gray-700 rounded-lg w-[560px] max-h-[70vh] flex flex-col">
      <div class="p-4 border-b border-gray-800 flex justify-between items-center">
        <h3 class="text-sm font-semibold">Start VSCode Server</h3>
        <button @click="showVscodeModal = false" class="text-gray-500 hover:text-gray-300">x</button>
      </div>
      <div class="px-4 pt-3 border-b border-gray-800 flex gap-2 text-xs">
        <button @click="vscodeTab = 'start'"
                :class="vscodeTab === 'start' ? 'bg-gray-700 text-gray-100' : 'bg-gray-800 text-gray-400 hover:text-gray-200'"
                class="px-3 py-1.5 rounded-t">启动</button>
        <button @click="vscodeTab = 'install'"
                :class="vscodeTab === 'install' ? 'bg-gray-700 text-gray-100' : 'bg-gray-800 text-gray-400 hover:text-gray-200'"
                class="px-3 py-1.5 rounded-t">安装</button>
      </div>
      <div class="p-4 space-y-3 text-sm overflow-y-auto">
        <div class="text-gray-400">cwd: <span class="mono text-gray-200" x-text="vscodeTargetCwd"></span></div>
        <div x-show="vscodeLoading" class="text-gray-500">Loading...</div>
        <div x-show="vscodeTab === 'start'" class="space-y-3">
          <label class="text-xs text-gray-400 block">Version</label>
          <select x-model="vscodeSelectedCommit" aria-label="Select VSCode server version"
                  :disabled="vscodeVersions.length === 0"
                  class="w-full bg-gray-800 text-gray-300 rounded px-2 py-2 text-sm outline-none disabled:opacity-60">
            <template x-for="v in vscodeVersions" :key="v.commit">
              <option :value="v.commit" x-text="`${v.version} (${v.commit.slice(0, 12)})`"></option>
            </template>
          </select>
          <div x-show="vscodeVersions.length === 0" class="text-yellow-400 text-xs">请先在「安装」页安装</div>
          <button @click="startVscode()"
                  :disabled="!vscodeSelectedCommit || vscodeVersions.length === 0 || vscodeLoading"
                  aria-label="Start VSCode server"
                  x-show="!vscodeStartedUrl"
                  class="w-full px-3 py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-500 rounded text-sm">Start</button>
          <a x-show="vscodeStartedUrl" :href="vscodeStartedUrl" target="_blank" rel="noopener"
             @click="showVscodeModal = false"
             class="block w-full px-3 py-2 bg-green-600 hover:bg-green-500 rounded text-sm text-center no-underline text-white">Open VSCode</a>
        </div>
        <div x-show="vscodeTab === 'install'" class="space-y-3">
          <label class="text-xs text-gray-400 block">VS Code version</label>
          <input x-model="vscodeInstallVersion" @input.debounce.400ms="fetchInstallInfo()"
                 placeholder="1.112.0"
                 class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm mono outline-none" />
          <label class="text-xs text-gray-400 block">Prompt (copy to Agent Link session)</label>
          <textarea readonly class="w-full h-24 bg-gray-800 border border-gray-700 rounded p-2 text-xs mono text-gray-300" x-text="vscodeInstall?.prompt || ''"></textarea>
          <label class="text-xs text-gray-400 block">Install script</label>
          <textarea readonly class="w-full h-40 bg-gray-800 border border-gray-700 rounded p-2 text-xs mono text-gray-300" x-text="vscodeInstall?.script || ''"></textarea>
          <label class="text-xs text-gray-400 block">Install command</label>
          <textarea readonly aria-label="Installation command" class="w-full h-20 bg-gray-800 border border-gray-700 rounded p-2 text-xs mono text-gray-300" x-text="vscodeInstall?.command || ''"></textarea>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function app() {
  return {
    managed: JSON.parse(localStorage.getItem('agent-link:managed') || '[]'),
    currentId: null,
    inputText: '',
    cwd: localStorage.getItem('agent-link:cwd') || '',
    model: localStorage.getItem('agent-link:model') || 'claude-sonnet-4-6',
    activeSet: new Set(),
    eventSource: null,
    seenUuids: new Set(),
    totalCost: 0,
    totalIn: 0,
    totalOut: 0,
    expandedGroups: new Set(),
    sidebarWidth: (() => {
      const storedWidth = Number(localStorage.getItem('agent-link:sidebar-width'));
      return Math.min(480, Math.max(180, Number.isFinite(storedWidth) ? storedWidth : 256));
    })(),
    sidebarCollapsed: (() => {
      const storedCollapsed = localStorage.getItem('agent-link:sidebar-collapsed');
      return storedCollapsed !== null ? storedCollapsed === 'true' : !window.matchMedia('(min-width: 768px)').matches;
    })(),

    showLoadModal: false,
    browseSessions: [],
    browseLoading: false,
    browseCwd: '',
    browseLimit: 30,
    browseOffset: 0,
    browseExpanded: new Set(),
    browseHasMore: false,
    vscodeVersions: [],
    vscodeActive: {},
    showVscodeModal: false,
    vscodeTargetCwd: '',
    vscodeTargetNodeId: '',
    vscodeTab: 'start',
    vscodeSelectedCommit: '',
    vscodeInstallVersion: '1.112.0',
    vscodeInstall: null,
    vscodeLoading: false,
    vscodeStartedUrl: '',

    // Panel mode
    panelMode: false,
    nodes: [],
    selectedNodeId: localStorage.getItem('agent-link:nodeId') || '',

    init() {
      Alpine.store('active', false);
      if (!this.cwd) this.cwd = window.location.hostname === 'localhost' ? '.' : '/';
      this.detectPanelMode();
      this.refreshActive();
      this.refreshVscodeActive();
      setInterval(() => { this.refreshActive(); this.refreshVscodeActive(); if (this.panelMode) this.refreshNodes(); }, 5000);
      this.$watch('cwd', (v) => localStorage.setItem('agent-link:cwd', v));
      this.$watch('model', (v) => localStorage.setItem('agent-link:model', v));
      this.$watch('sidebarCollapsed', (v) => localStorage.setItem('agent-link:sidebar-collapsed', String(v)));
      this.$watch('sidebarWidth', (v) => localStorage.setItem('agent-link:sidebar-width', String(this.clampWidth(v))));
      this.$watch('selectedNodeId', (v) => localStorage.setItem('agent-link:nodeId', v));
    },

    async detectPanelMode() {
      try {
        const res = await fetch('/api/nodes');
        if (res.ok) {
          this.panelMode = true;
          this.nodes = await res.json();
          if (!this.selectedNodeId && this.nodes.length > 0) {
            this.selectedNodeId = (this.nodes.find(n => n.online) || this.nodes[0]).nodeId;
          }
        }
      } catch {
        this.panelMode = false;
      }
    },

    async refreshNodes() {
      try {
        const res = await fetch('/api/nodes');
        if (res.ok) this.nodes = await res.json();
      } catch {}
    },

    isNodeOnline(nodeId) {
      const n = this.nodes.find(n => n.nodeId === nodeId);
      return n?.online ?? false;
    },

    get groupedByNode() {
      // Group managed sessions by nodeId, then by cwd
      const nodeMap = new Map();
      // Initialize from known nodes
      for (const n of this.nodes) {
        nodeMap.set(n.nodeId, { nodeId: n.nodeId, label: n.label, cwdGroups: [] });
      }
      // Group sessions
      const cwdMap = new Map(); // nodeId:cwd → sessions
      for (const s of this.managed) {
        const nid = s.nodeId || '(local)';
        const key = nid + ':' + (s.cwd || '(unknown)');
        if (!cwdMap.has(key)) cwdMap.set(key, { nodeId: nid, cwd: s.cwd || '(unknown)', sessions: [] });
        cwdMap.get(key).sessions.push(s);
      }
      // Assign cwd groups to nodes
      for (const [, group] of cwdMap) {
        if (!nodeMap.has(group.nodeId)) {
          nodeMap.set(group.nodeId, { nodeId: group.nodeId, label: group.nodeId, cwdGroups: [] });
        }
        nodeMap.get(group.nodeId).cwdGroups.push(group);
      }
      return [...nodeMap.values()];
    },

    clampWidth(width) {
      return Math.min(480, Math.max(180, Number.isFinite(width) ? width : 256));
    },

    toggleSidebar() {
      this.sidebarCollapsed = !this.sidebarCollapsed;
    },

    sidebarToggleLabel() {
      return this.sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar';
    },

    resizeSidebarBy(delta) {
      if (this.sidebarCollapsed) return;
      this.sidebarWidth = this.clampWidth(this.sidebarWidth + delta);
    },

    handleResizeKeydown(event) {
      if (event.key === 'ArrowLeft') { event.preventDefault(); this.resizeSidebarBy(-12); }
      else if (event.key === 'ArrowRight') { event.preventDefault(); this.resizeSidebarBy(12); }
      else if (event.key === 'Home') { event.preventDefault(); this.resizeSidebarBy(180 - this.sidebarWidth); }
      else if (event.key === 'End') { event.preventDefault(); this.resizeSidebarBy(480 - this.sidebarWidth); }
    },

    startResize(event) {
      if (this.sidebarCollapsed) return;
      const startX = event.touches?.[0]?.clientX ?? event.clientX;
      const startWidth = this.sidebarWidth;
      let frame = null;
      let nextWidth = this.sidebarWidth;
      const previousUserSelect = document.body.style.userSelect;
      document.body.style.userSelect = 'none';
      const onMove = (e) => {
        if (e.type === 'touchmove' && e.cancelable) e.preventDefault();
        const clientX = e.touches?.[0]?.clientX ?? e.clientX;
        if (typeof clientX !== 'number') return;
        nextWidth = this.clampWidth(startWidth + (clientX - startX));
        if (frame) return;
        frame = requestAnimationFrame(() => {
          this.sidebarWidth = nextWidth;
          frame = null;
        });
      };
      const onUp = () => {
        if (frame) cancelAnimationFrame(frame);
        this.sidebarWidth = nextWidth;
        document.body.style.userSelect = previousUserSelect;
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        window.removeEventListener('touchmove', onMove);
        window.removeEventListener('touchend', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('touchend', onUp);
    },

    // Dispatch event to messages component
    syncActive() {
      Alpine.store('active', !!(this.currentId && this.activeSet.has(this.currentId)));
    },

    msg(type, detail) {
      window.dispatchEvent(new CustomEvent('msg:' + type, { detail }));
    },

    async refreshActive() {
      try {
        const res = await fetch('/api/active');
        this.activeSet = new Set(await res.json());
        this.syncActive();
      } catch {}
    },

    isVscodeActive(cwd, nodeId) {
      if (this.panelMode && nodeId) {
        return !!this.vscodeActive[nodeId + ':' + cwd];
      }
      return !!this.vscodeActive[cwd];
    },

    vscodeUrl(cwd, nodeId) {
      if (this.panelMode && nodeId) {
        return `/vscode/${encodeURIComponent(nodeId)}/${encodeURIComponent(cwd)}/`;
      }
      return `/vscode/${encodeURIComponent(cwd)}/`;
    },

    async refreshVscodeActive() {
      try {
        const res = await fetch('/api/vscode/active');
        const list = await res.json();
        const map = {};
        for (const item of list || []) {
          if (item.nodeId) {
            map[item.nodeId + ':' + item.cwd] = item;
          } else {
            map[item.cwd] = item;
          }
        }
        this.vscodeActive = map;
      } catch {}
    },

    async openVscode(cwd, nodeId) {
      this.vscodeTargetCwd = cwd;
      this.vscodeTargetNodeId = nodeId || '';
      this.vscodeTab = 'start';
      this.vscodeSelectedCommit = '';
      this.vscodeStartedUrl = '';
      this.vscodeLoading = true;
      this.showVscodeModal = true;
      try {
        const params = nodeId ? `?nodeId=${encodeURIComponent(nodeId)}` : '';
        const response = await fetch('/api/vscode/versions' + params);
        this.vscodeVersions = await response.json();
        this.vscodeTab = this.vscodeVersions.length === 0 ? 'install' : 'start';
        await this.fetchInstallInfo();
        if (this.vscodeVersions.length > 0) {
          this.vscodeSelectedCommit = this.vscodeVersions[0].commit;
        }
      } catch {
        this.vscodeVersions = [];
      }
      this.vscodeLoading = false;
    },

    async fetchInstallInfo() {
      try {
        const version = this.vscodeInstallVersion || '1.112.0';
        const params = new URLSearchParams({ version });
        if (this.vscodeTargetNodeId) params.set('nodeId', this.vscodeTargetNodeId);
        const res = await fetch(`/api/vscode/install-command?${params}`);
        this.vscodeInstall = await res.json();
      } catch {
        this.vscodeInstall = null;
      }
    },

    async startVscode() {
      if (!this.vscodeTargetCwd || !this.vscodeSelectedCommit) return;
      this.vscodeLoading = true;
      try {
        const body = { cwd: this.vscodeTargetCwd, commit: this.vscodeSelectedCommit };
        if (this.vscodeTargetNodeId) body.nodeId = this.vscodeTargetNodeId;
        const res = await fetch('/api/vscode/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        await this.refreshVscodeActive();
        this.vscodeStartedUrl = this.vscodeUrl(this.vscodeTargetCwd, this.vscodeTargetNodeId);
      } catch (err) {
        alert(err?.message || 'Failed to start VSCode server');
      }
      this.vscodeLoading = false;
    },

    async stopVscode(cwd, nodeId) {
      const key = nodeId ? nodeId + ':' + cwd : cwd;
      if (!this.vscodeActive[key]) return;
      if (!confirm(`Stop VSCode server for ${cwd}?`)) return;
      try {
        const body = { cwd };
        if (nodeId) body.nodeId = nodeId;
        await fetch('/api/vscode/stop', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
      } catch {}
      this.refreshVscodeActive();
    },

    saveManaged() {
      localStorage.setItem('agent-link:managed', JSON.stringify(this.managed));
    },

    get groupedManaged() {
      const map = new Map();
      for (const s of this.managed) {
        const key = s.cwd || '(unknown)';
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(s);
      }
      return Array.from(map, ([cwd, sessions]) => ({ cwd, sessions }));
    },

    get groupedBrowse() {
      const map = new Map();
      for (const s of this.browseSessions) {
        const key = s.cwd || '(unknown)';
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(s);
      }
      return Array.from(map, ([cwd, sessions]) => ({ cwd, sessions }));
    },

    toggleGroup(cwd) {
      this.expandedGroups.has(cwd) ? this.expandedGroups.delete(cwd) : this.expandedGroups.add(cwd);
      this.expandedGroups = new Set(this.expandedGroups);
    },

    expandGroup(cwd) {
      this.expandedGroups.add(cwd || '(unknown)');
      this.expandedGroups = new Set(this.expandedGroups);
    },

    newSession() {
      this.currentId = null;
      this.msg('clear');
      this.seenUuids = new Set();
      this.totalCost = 0;
      this.totalIn = 0;
      this.totalOut = 0;
      if (this.eventSource) { this.eventSource.close(); this.eventSource = null; }
      this.$nextTick(() => this.$el.querySelector('input[x-model="inputText"]')?.focus());
    },

    async send() {
      if (!this.inputText.trim()) return;

      if (!this.currentId) {
        const prompt = this.inputText.trim();
        this.inputText = '';
        this.msg('append', { type: 'user', message: { content: [{ type: 'text', text: prompt }] } });

        const nodeId = this.panelMode ? this.selectedNodeId : undefined;
        try {
          const body = { prompt, cwd: this.cwd, model: this.model };
          if (nodeId) body.nodeId = nodeId;
          const res = await fetch('/api/query', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const data = await res.json();
          if (data.error) { this.msg('append', { type: 'error', error: data.error }); return; }

          this.currentId = data.sessionId;
          const entry = { sessionId: data.sessionId, cwd: this.cwd, model: this.model, label: prompt.slice(0, 40) };
          if (nodeId) entry.nodeId = nodeId;
          this.managed.unshift(entry);
          this.saveManaged();
          if (this.panelMode && nodeId) {
            this.expandGroup('node:' + nodeId);
            this.expandGroup(nodeId + ':' + this.cwd);
          } else {
            this.expandGroup(this.cwd);
          }
          this.activeSet.add(data.sessionId);
          this.syncActive();
          this.connectSSE(data.sessionId);
        } catch (err) {
          this.msg('append', { type: 'error', error: err.message });
        }
        return;
      }

      const prompt = this.inputText.trim();
      this.inputText = '';
      this.msg('append', { type: 'user', message: { content: [{ type: 'text', text: prompt }] } });

      const s = this.managed.find(s => s.sessionId === this.currentId);
      try {
        const body = { prompt, sessionId: this.currentId, cwd: s?.cwd || this.cwd, model: s?.model || this.model };
        if (s?.nodeId) body.nodeId = s.nodeId;
        const res = await fetch('/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.error) { this.msg('append', { type: 'error', error: data.error }); return; }
        this.activeSet.add(this.currentId);
        this.syncActive();
        this.connectSSE(this.currentId);
      } catch (err) {
        this.msg('append', { type: 'error', error: err.message });
      }
    },

    async interruptSession() {
      if (!this.currentId) return;
      const s = this.managed.find(s => s.sessionId === this.currentId);
      const headers = {};
      if (this.panelMode && s?.nodeId) headers['x-node-id'] = s.nodeId;
      try { await fetch(`/api/interrupt/${this.currentId}`, { method: 'POST', headers }); } catch {}
    },

    async changeModel() {
      if (!this.currentId) return;
      const s = this.managed.find(s => s.sessionId === this.currentId);
      if (s) s.model = this.model;
      this.saveManaged();
      try {
        const headers = { 'Content-Type': 'application/json' };
        if (this.panelMode && s?.nodeId) headers['x-node-id'] = s.nodeId;
        await fetch(`/api/model/${this.currentId}`, {
          method: 'POST',
          headers,
          body: JSON.stringify({ model: this.model }),
        });
      } catch {}
    },

    async switchSession(id) {
      if (this.currentId === id) return;
      this.currentId = id;
      this.msg('clear');
      this.seenUuids = new Set();
      this.totalCost = 0;
      this.totalIn = 0;
      this.totalOut = 0;

      const s = this.managed.find(s => s.sessionId === id);
      if (s) {
        if (this.panelMode && s.nodeId) {
          this.expandGroup('node:' + s.nodeId);
          this.expandGroup(s.nodeId + ':' + (s.cwd || this.cwd));
        } else {
          this.expandGroup(s.cwd);
        }
        this.cwd = s.cwd || this.cwd;
        if (s.model) this.model = s.model;
        if (s.nodeId) this.selectedNodeId = s.nodeId;
      }

      try {
        const cwd = s?.cwd || this.cwd;
        const params = new URLSearchParams({ cwd });
        if (this.panelMode && s?.nodeId) params.set('nodeId', s.nodeId);
        const res = await fetch(`/api/sessions/${id}/messages?${params}`);
        if (res.ok) {
          const msgs = (await res.json()) || [];
          for (const m of msgs) { if (m.uuid) this.seenUuids.add(m.uuid); }
          this.msg('load', msgs);
        }
      } catch {}

      this.connectSSE(id);
    },

    connectSSE(id) {
      if (this.eventSource) this.eventSource.close();
      const es = new EventSource(`/api/events/${id}`);
      this.eventSource = es;
      es.addEventListener('message', (e) => {
        if (this.currentId !== id) { es.close(); return; }
        try { this.handleEvent(JSON.parse(e.data)); } catch {}
      });
      es.addEventListener('error', () => {
        if (this.currentId !== id || !this.activeSet.has(id)) {
          es.close();
          if (this.eventSource === es) this.eventSource = null;
        }
      });
    },

    handleEvent(msg) {
      if (msg.uuid && msg.type !== 'stream_event') {
        if (this.seenUuids.has(msg.uuid)) {
          if (msg.type === 'assistant') this.msg('reset-stream');
          return;
        }
        this.seenUuids.add(msg.uuid);
      }

      if (msg.type === 'stream_event') {
        this.msg('stream', msg.event);
      } else if (msg.type === 'assistant') {
        this.msg('reset-stream');
        this.msg('append', msg);
      } else if (msg.type === 'user') {
        this.msg('append', msg);
      } else if (msg.type === 'result') {
        this.totalCost += msg.total_cost_usd || 0;
        this.totalIn += msg.usage?.input_tokens || 0;
        this.totalOut += msg.usage?.output_tokens || 0;
        this.msg('append', msg);
      } else if (msg.type === 'system') {
        if (msg.subtype === 'init' && this.seenUuids.size > 0) return;
        this.msg('append', msg);
      } else if (msg.type === 'status') {
        if (msg.status === 'idle') {
          this.activeSet.delete(this.currentId);
          this.activeSet = new Set(this.activeSet);
          this.syncActive();
        }
      } else if (msg.type === 'error') {
        this.msg('append', msg);
      }
    },

    async loadSessions() {
      this.showLoadModal = true;
      this.browseCwd = '';
      this.browseOffset = 0;
      this.browseSessions = [];
      this.browseExpanded = new Set();
      this.fetchBrowseSessions();
    },

    async fetchBrowseSessions(append = false) {
      this.browseLoading = true;
      try {
        const params = new URLSearchParams({ limit: String(this.browseLimit), offset: String(this.browseOffset) });
        if (this.browseCwd) params.set('cwd', this.browseCwd);
        const res = await fetch(`/api/sessions?${params}`);
        const data = await res.json();
        this.browseHasMore = Array.isArray(data) && data.length >= this.browseLimit;
        this.browseSessions = append ? [...this.browseSessions, ...data] : data;
      } catch {
        if (!append) this.browseSessions = [];
        this.browseHasMore = false;
      }
      this.browseLoading = false;
    },

    addToManaged(session) {
      if (!this.managed.find(s => s.sessionId === session.sessionId)) {
        const entry = {
          sessionId: session.sessionId,
          cwd: session.cwd || this.cwd,
          model: '',
          label: session.summary || session.firstPrompt?.slice(0, 40) || session.sessionId.slice(0, 12),
        };
        if (session.nodeId) entry.nodeId = session.nodeId;
        this.managed.unshift(entry);
        this.saveManaged();
        if (this.panelMode && session.nodeId) {
          this.expandGroup('node:' + session.nodeId);
          this.expandGroup(session.nodeId + ':' + (session.cwd || this.cwd));
        } else {
          this.expandGroup(session.cwd || this.cwd);
        }
      }
      this.showLoadModal = false;
      this.switchSession(session.sessionId);
    },

    removeManaged(id) {
      this.managed = this.managed.filter(s => s.sessionId !== id);
      this.saveManaged();
      if (this.currentId === id) {
        this.currentId = null;
        this.msg('clear');
        if (this.eventSource) this.eventSource.close();
      }
    },
  };
}
</script>
