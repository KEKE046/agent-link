<!--
  Agent Link — frontend module structure
  ═══════════════════════════════════════════════════
  index.html       HTML skeleton + Alpine templates
  app.js           Core state, session lifecycle, SSE, send/switch/interrupt
  sidebar.js       Left sidebar: grouped sessions, add-agent dialog, folder management
  agent-config.js  Right sidebar: per-session config (model, thinking, env, etc.)
  renderer.js      Message rendering component + Alpine messages component

  Component communication:
    emit(name, detail) -> window CustomEvent
    sidebar -> app:  session-switch, session-remove, agent-create, folder-add, folder-remove, folder-rename
    config  -> app:  config-save, config-compact, config-reload
    app -> components: reactive state (currentId, managed, managedFolders, activeSet, nodes)

  Styles: tailwind.input.css -> styles.css (bunx @tailwindcss/cli)
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Link</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/renderer.js"></script>
  <script src="/app.js"></script>
  <script src="/sidebar.js"></script>
  <script src="/agent-config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 h-screen overflow-hidden">

<div x-data="app()" x-cloak class="flex h-screen"
     @session-switch.window="switchSession($event.detail)"
     @session-new.window="newSession()"
     @session-remove.window="removeManaged($event.detail)"
     @agent-create.window="createAgent($event.detail)"
     @folder-add.window="addFolder($event.detail)"
     @folder-remove.window="removeFolder($event.detail)"
     @folder-rename.window="renameFolder($event.detail)"
     @config-save.window="onConfigSave($event.detail)"
     @data-refresh.window="refreshData()">

  <!-- Login screen -->
  <template x-if="authRequired && !authenticated">
    <div class="flex-1 flex items-center justify-center">
      <div class="bg-gray-900 border border-gray-700 rounded-lg w-80 p-6 space-y-4">
        <h2 class="text-lg font-semibold text-gray-200 text-center">Agent Link</h2>
        <input x-model="loginToken" @keydown.enter.prevent="login()" type="password" placeholder="Admin token"
               class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm mono outline-none focus:border-gray-500" autofocus />
        <div x-show="loginError" class="text-red-400 text-xs" x-text="loginError"></div>
        <button @click="login()" :disabled="!loginToken.trim()"
                class="w-full px-3 py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-500 rounded text-sm">Login</button>
      </div>
    </div>
  </template>

  <!-- Main app -->
  <template x-if="!authRequired || authenticated">
  <div class="flex h-screen w-full">

  <!-- ═══ Left Sidebar ═══ -->
  <div x-data="sidebar()" class="flex flex-shrink-0">
    <div class="bg-gray-900 flex flex-col flex-shrink-0 overflow-hidden transition-[width] duration-200"
         :style="`width: ${sidebarCollapsed ? 0 : sidebarWidth}px`"
         :class="sidebarCollapsed ? '' : 'border-r border-gray-800'">
      <div class="flex-1 overflow-y-auto">
        <template x-for="n in groupedSessions" :key="n.nodeId">
          <div>
            <!-- Node header -->
            <div @click="toggleGroup('node:' + n.nodeId)"
                 class="px-3 py-1.5 flex items-center gap-1.5 cursor-pointer hover:bg-gray-800/50 text-xs text-gray-300 sticky top-0 bg-gray-900 border-b border-gray-800/50 z-10">
              <span x-text="expandedGroups.has('node:' + n.nodeId) ? '▾' : '▸'" class="text-gray-600 w-3"></span>
              <span class="w-2 h-2 rounded-full flex-shrink-0" :class="isNodeOnline(n.nodeId) ? 'bg-green-400' : 'bg-gray-600'"></span>
              <span class="truncate flex-1 font-semibold" x-text="n.label || n.nodeId"></span>
              <div class="relative">
                <button @click.stop="openMenu($el, n.nodeId, 'node')" title="Add"
                        class="sidebar-btn">+</button>
              </div>
            </div>
            <!-- CWD groups -->
            <template x-if="expandedGroups.has('node:' + n.nodeId)">
              <div>
                <template x-for="g in n.cwdGroups" :key="n.nodeId + ':' + g.cwd">
                  <div>
                    <div class="pl-7 pr-3 py-1 flex items-center gap-1.5 hover:bg-gray-800/50 text-xs text-gray-400 sticky bg-gray-900 border-b border-gray-800/30" style="top:1.5rem">
                      <span @click="toggleGroup(n.nodeId + ':' + g.cwd)" x-text="expandedGroups.has(n.nodeId + ':' + g.cwd) ? '▾' : '▸'" class="text-gray-600 w-3 cursor-pointer"></span>
                      <span @click="g.sessions.length === 1 ? emit('session-switch', g.sessions[0].sessionId) : toggleGroup(n.nodeId + ':' + g.cwd)"
                            class="truncate flex-1 font-medium cursor-pointer" :title="g.cwd"
                            x-text="g.label ? '[' + g.label + ']' : g.cwd"></span>
                      <span x-show="g.sessions.length > 1" class="text-gray-600 text-[10px]" x-text="'(' + g.sessions.length + ')'"></span>
                      <div class="relative">
                        <button @click.stop="openMenu($el, n.nodeId + ':' + g.cwd, 'folder')"
                                class="sidebar-btn">…</button>
                      </div>
                    </div>
                    <template x-if="expandedGroups.has(n.nodeId + ':' + g.cwd)">
                      <div>
                        <template x-for="s in g.sessions" :key="s.sessionId">
                          <div @click="emit('session-switch', s.sessionId)"
                               :class="currentId === s.sessionId ? 'bg-gray-800 border-l-2 border-blue-400' : 'border-l-2 border-transparent'"
                               class="pl-10 pr-3 py-1 cursor-pointer hover:bg-gray-800/50 group flex items-center gap-2"
                               :style="!isNodeOnline(n.nodeId) ? 'opacity:0.5' : ''">
                            <span class="w-2 h-2 rounded-full flex-shrink-0" :class="activeSet.has(s.sessionId) ? 'bg-green-400 animate-pulse' : 'bg-gray-600'"></span>
                            <span class="text-sm truncate flex-1" x-text="s.name || s.sessionId.slice(0, 8)"></span>
                            <button @click.stop="emit('session-remove', s.sessionId)"
                                    class="sidebar-btn sidebar-btn-danger opacity-0 group-hover:opacity-100">x</button>
                          </div>
                        </template>
                        <div x-show="g.sessions.length === 0" class="pl-10 pr-3 py-1 text-gray-600 text-xs">No agents</div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
        <div x-show="managed.length === 0 && managedFolders.length === 0" class="p-4 text-gray-600 text-sm text-center">No agents</div>
      </div>
    </div>
    <!-- Resize handle -->
    <div x-show="!sidebarCollapsed" @mousedown.prevent="startResize($event)" @touchstart.prevent="startResize($event)"
         @keydown="handleResizeKeydown($event)" tabindex="0"
         role="separator" aria-orientation="vertical" aria-label="Resize sidebar"
         class="w-1 bg-gray-800 hover:bg-gray-700 active:bg-gray-700 cursor-col-resize flex-shrink-0 focus-visible:outline focus-visible:outline-2 focus-visible:outline-blue-500"></div>

    <!-- Fixed dropdown: node + menu -->
    <template x-if="nodeMenu">
      <div @click.outside="nodeMenu = null"
           class="fixed bg-gray-800 border border-gray-700 rounded shadow-lg py-1 z-50 min-w-[7rem]"
           :style="`top:${menuPos.top}px; left:${menuPos.left}px`">
        <button @click.stop="openAgentDialog(nodeMenu); nodeMenu = null"
                class="w-full text-left px-3 py-1 text-xs text-gray-300 hover:bg-gray-700">Add Agent</button>
        <button @click.stop="openFolderPopup(nodeMenu)"
                class="w-full text-left px-3 py-1 text-xs text-gray-300 hover:bg-gray-700">Add Folder</button>
      </div>
    </template>

    <!-- Fixed dropdown: folder ... menu -->
    <template x-if="folderMenu">
      <div @click.outside="folderMenu = null"
           class="fixed bg-gray-800 border border-gray-700 rounded shadow-lg py-1 z-50 min-w-[7rem]"
           :style="`top:${menuPos.top}px; left:${menuPos.left}px`">
        <button @click.stop="openAgentDialog(folderMenu.split(':')[0], folderMenu.split(':').slice(1).join(':')); folderMenu = null"
                class="w-full text-left px-3 py-1 text-xs text-gray-300 hover:bg-gray-700">Add Agent</button>
        <button @click.stop="openRenamePopup(folderMenu.split(':').slice(1).join(':'), folderMenu.split(':')[0]); folderMenu = null"
                class="w-full text-left px-3 py-1 text-xs text-gray-300 hover:bg-gray-700">Rename</button>
        <button @click.stop="emit('folder-remove', {cwd: folderMenu.split(':').slice(1).join(':'), nodeId: folderMenu.split(':')[0] === '(local)' ? undefined : folderMenu.split(':')[0]}); folderMenu = null"
                class="w-full text-left px-3 py-1 text-xs text-gray-300 hover:bg-gray-700">Remove</button>
      </div>
    </template>

    <!-- ═══ Add Agent Dialog ═══ -->
    <template x-if="agentDialog">
      <div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50" @click.self="agentDialog = null" @keydown.escape.window="agentDialog = null">
        <div class="bg-gray-900 border border-gray-700 rounded-lg flex overflow-hidden" style="max-height:80vh"
             :style="agentDialog.configOpen ? 'width:800px' : 'width:480px'">

          <!-- Left: main form -->
          <div class="flex flex-col flex-1 min-w-0">
            <!-- Header -->
            <div class="px-4 py-3 border-b border-gray-800 flex items-center gap-2">
              <span class="text-sm font-semibold text-gray-200 flex-1">Create Agent</span>
              <button @click="agentDialog.configOpen = !agentDialog.configOpen"
                      :class="agentDialog.configOpen ? 'bg-gray-700 text-gray-200' : 'text-gray-500 hover:text-gray-300'"
                      class="px-2 py-1 text-xs rounded hover:bg-gray-800" title="Toggle config">&#9881;</button>
              <button @click="agentDialog = null" class="px-2 py-1 text-gray-600 hover:text-gray-300 text-xs rounded hover:bg-gray-800">x</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-3">
              <!-- Agent name -->
              <div>
                <label class="text-xs text-gray-400 block mb-1">Agent Name *</label>
                <input x-model="agentDialog.name" placeholder="e.g. Code Helper"
                       class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm mono outline-none focus:border-gray-500" autofocus />
              </div>

              <!-- Node / CWD -->
              <div class="flex gap-2">
                <div class="flex-1" x-show="panelMode">
                  <label class="text-xs text-gray-400 block mb-1">Node</label>
                  <select x-model="agentDialog.nodeId" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-xs outline-none">
                    <option value="(local)">(local)</option>
                    <template x-for="n in nodes" :key="n.nodeId">
                      <option :value="n.nodeId" x-text="n.label || n.nodeId"></option>
                    </template>
                  </select>
                </div>
                <div class="flex-1">
                  <label class="text-xs text-gray-400 block mb-1">CWD</label>
                  <input x-model="agentDialog.cwd" placeholder="/path/to/project"
                         class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm mono outline-none focus:border-gray-500" />
                </div>
              </div>

              <!-- Tabs: New / Load -->
              <div class="flex gap-1">
                <button @click="agentDialog.tab = 'new'"
                        :class="agentDialog.tab === 'new' ? 'bg-gray-700 text-gray-100' : 'text-gray-500 hover:text-gray-300 hover:bg-gray-800'"
                        class="px-4 py-1.5 text-xs font-medium rounded">New</button>
                <button @click="agentDialog.tab = 'load'; if (agentDialog.browseSessions.length === 0) fetchBrowseSessions()"
                        :class="agentDialog.tab === 'load' ? 'bg-gray-700 text-gray-100' : 'text-gray-500 hover:text-gray-300 hover:bg-gray-800'"
                        class="px-4 py-1.5 text-xs font-medium rounded">Load</button>
              </div>

              <!-- New tab -->
              <div x-show="agentDialog.tab === 'new'">
                <label class="text-xs text-gray-400 block mb-1">Initial Prompt</label>
                <textarea x-model="agentDialog.initialPrompt" rows="3"
                          placeholder="hello"
                          class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm mono outline-none focus:border-gray-500 resize-y"></textarea>
              </div>

              <!-- Load tab -->
              <div x-show="agentDialog.tab === 'load'" class="space-y-2">
                <div class="flex gap-1">
                  <input x-model="agentDialog.browseFilter" @input.debounce.500ms="agentDialog.browseOffset = 0; fetchBrowseSessions()" placeholder="Filter by cwd..."
                         class="flex-1 bg-gray-800 border border-gray-700 rounded px-3 py-1 text-xs mono outline-none focus:border-gray-500" />
                  <button @click="agentDialog.browseExact = !agentDialog.browseExact; agentDialog.browseOffset = 0; fetchBrowseSessions()"
                          :class="agentDialog.browseExact ? 'bg-blue-600 text-white' : 'bg-gray-800 text-gray-500 hover:text-gray-300'"
                          class="px-2 py-1 border border-gray-700 rounded text-[10px] flex-shrink-0" title="Exact match">exact</button>
                </div>
                <div class="max-h-60 overflow-y-auto border border-gray-800 rounded">
                  <div x-show="agentDialog.browseLoading" class="p-3 text-gray-500 text-xs text-center">Loading...</div>
                  <template x-for="s in agentDialog.browseSessions" :key="s.sessionId">
                    <div @click="agentDialog.browseSelected = agentDialog.browseSelected === s.sessionId ? null : s.sessionId; if (s.cwd) agentDialog.cwd = s.cwd; if (!agentDialog.name && s.summary) agentDialog.name = s.summary.slice(0, 30)"
                         :class="agentDialog.browseSelected === s.sessionId ? 'bg-blue-600/20 border-l-2 border-blue-400' : 'border-l-2 border-transparent'"
                         class="px-3 py-1.5 cursor-pointer hover:bg-gray-800/50">
                      <div class="text-xs truncate" x-text="s.summary || s.sessionId.slice(0, 12)"></div>
                      <div class="text-[10px] text-gray-600 mt-0.5 flex gap-3">
                        <span class="truncate" x-text="s.cwd || ''"></span>
                        <span class="flex-shrink-0" x-text="s.lastModified ? new Date(s.lastModified).toLocaleString() : ''"></span>
                      </div>
                    </div>
                  </template>
                  <div x-show="!agentDialog.browseLoading && agentDialog.browseSessions.length === 0" class="p-3 text-gray-600 text-xs text-center">No sessions found</div>
                  <button x-show="agentDialog.browseHasMore" @click="agentDialog.browseOffset += agentDialog.browseLimit; fetchBrowseSessions(true)"
                          class="w-full py-1.5 text-xs text-gray-500 hover:text-gray-300 hover:bg-gray-800">Load more...</button>
                </div>
              </div>
            </div>

            <!-- Footer -->
            <div class="p-3 border-t border-gray-800 flex gap-2">
              <button @click="agentDialog = null" class="flex-1 px-3 py-2 bg-gray-800 hover:bg-gray-700 rounded text-sm">Cancel</button>
              <button @click="submitAgentDialog()" :disabled="!agentDialog.name.trim() || (agentDialog.tab === 'load' && !agentDialog.browseSelected)"
                      class="flex-1 px-3 py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-500 rounded text-sm">Create</button>
            </div>
          </div>

          <!-- Right: config panel (expandable) -->
          <div x-show="agentDialog.configOpen" class="w-[300px] border-l border-gray-800 flex flex-col overflow-y-auto bg-gray-900/80">
            <div class="p-3 space-y-3 text-xs">
              <div class="font-semibold text-gray-300">Agent Config</div>

              <!-- Model -->
              <div>
                <label class="text-gray-500 block mb-1">Model</label>
                <select x-model="agentDialog.cfgModel" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs">
                  <option value="">(default)</option>
                  <option value="sonnet">Sonnet</option>
                  <option value="opus">Opus</option>
                  <option value="haiku">Haiku</option>
                </select>
              </div>

              <!-- Thinking + Effort -->
              <div class="flex gap-2">
                <div class="flex-1">
                  <label class="text-gray-500 block mb-1">Thinking</label>
                  <select x-model="agentDialog.cfgThinking" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs">
                    <option value="">(default)</option>
                    <option value="adaptive">adaptive</option>
                    <option value="enabled">enabled</option>
                    <option value="disabled">disabled</option>
                  </select>
                </div>
                <div class="flex-1">
                  <label class="text-gray-500 block mb-1">Effort</label>
                  <select x-model="agentDialog.cfgEffort" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs">
                    <option value="">(default)</option>
                    <option value="low">low</option>
                    <option value="medium">medium</option>
                    <option value="high">high</option>
                    <option value="max">max</option>
                  </select>
                </div>
              </div>

              <!-- Permission -->
              <div>
                <label class="text-gray-500 block mb-1">Permission</label>
                <select x-model="agentDialog.cfgPermission" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs">
                  <option value="">(default)</option>
                  <option value="bypassPermissions">bypassPermissions</option>
                  <option value="default">default</option>
                  <option value="acceptEdits">acceptEdits</option>
                  <option value="plan">plan</option>
                  <option value="dontAsk">dontAsk</option>
                </select>
              </div>

              <!-- System Prompt (collapsible) -->
              <div>
                <button @click="agentDialog.cfgShowSystemPrompt = !agentDialog.cfgShowSystemPrompt" class="text-gray-400 hover:text-gray-200 flex items-center gap-1">
                  <span x-text="agentDialog.cfgShowSystemPrompt ? '▾' : '▸'" class="w-3 text-gray-600"></span>System Prompt
                </button>
                <div x-show="agentDialog.cfgShowSystemPrompt" class="mt-1">
                  <textarea x-model="agentDialog.cfgSystemPrompt" rows="4" :placeholder="'Default: Your Name is ' + (agentDialog.name || '...')"
                            class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs resize-y"></textarea>
                </div>
              </div>

              <!-- ENV (collapsible) -->
              <div>
                <button @click="agentDialog.cfgShowEnv = !agentDialog.cfgShowEnv" class="text-gray-400 hover:text-gray-200 flex items-center gap-1">
                  <span x-text="agentDialog.cfgShowEnv ? '▾' : '▸'" class="w-3 text-gray-600"></span>ENV
                </button>
                <div x-show="agentDialog.cfgShowEnv" class="mt-1">
                  <textarea x-model="agentDialog.cfgEnvText" rows="3" placeholder="KEY=value (one per line)"
                            class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs mono resize-y"></textarea>
                </div>
              </div>

              <!-- Advanced JSON (collapsible) -->
              <div>
                <button @click="agentDialog.cfgShowJson = !agentDialog.cfgShowJson; if (agentDialog.cfgShowJson) syncDialogJson()" class="text-gray-400 hover:text-gray-200 flex items-center gap-1">
                  <span x-text="agentDialog.cfgShowJson ? '▾' : '▸'" class="w-3 text-gray-600"></span>Advanced JSON
                </button>
                <div x-show="agentDialog.cfgShowJson" class="mt-1 space-y-1">
                  <textarea x-model="agentDialog.cfgJsonText" rows="8"
                            class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs mono resize-y"></textarea>
                  <div x-show="agentDialog.cfgJsonError" class="text-red-400 text-[10px]" x-text="agentDialog.cfgJsonError"></div>
                  <button @click="syncDialogFromJson()" class="px-2 py-1 bg-gray-800 border border-gray-700 rounded text-gray-400 hover:text-gray-200 text-xs">Apply JSON</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- Rename popup -->
    <template x-if="renamePopup">
      <div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50" @click.self="renamePopup = null" @keydown.escape.window="renamePopup = null">
        <div class="bg-gray-900 border border-gray-700 rounded-lg w-80 p-4 space-y-3">
          <div class="text-xs text-gray-400 truncate" x-text="renamePopup.cwd"></div>
          <input id="rename-input" x-model="renamePopup.label" @keydown.enter.prevent="submitRename()" placeholder="Display name (empty to reset)"
                 class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm mono outline-none focus:border-gray-500" />
          <div class="flex gap-2">
            <button @click="renamePopup = null" class="flex-1 px-3 py-1.5 bg-gray-800 hover:bg-gray-700 rounded text-sm">Cancel</button>
            <button @click="submitRename()" class="flex-1 px-3 py-1.5 bg-blue-600 hover:bg-blue-500 rounded text-sm">Save</button>
          </div>
        </div>
      </div>
    </template>

    <!-- Add Folder popup -->
    <template x-if="folderPopup">
      <div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50" @click.self="folderPopup = null" @keydown.escape.window="folderPopup = null">
        <div class="bg-gray-900 border border-gray-700 rounded-lg w-96 p-4 space-y-3">
          <div class="text-sm font-semibold text-gray-200">Add Folder</div>
          <input id="folder-cwd-input" x-model="folderPopup.cwd" @keydown.enter.prevent="submitFolderPopup()" placeholder="/path/to/project"
                 class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm mono outline-none focus:border-gray-500" />
          <div x-show="folderPopup.loading" class="text-xs text-gray-500 text-center">Loading...</div>
          <div x-show="!folderPopup.loading && folderPopup.folders.length > 0">
            <div class="text-xs text-gray-500 mb-1">From existing sessions:</div>
            <div class="max-h-40 overflow-y-auto border border-gray-800 rounded">
              <template x-for="f in folderPopup.folders" :key="f">
                <button @click="folderPopup.cwd = f"
                        :class="folderPopup.cwd === f ? 'bg-blue-600/20 text-gray-200' : 'text-gray-400 hover:bg-gray-800/50'"
                        class="w-full text-left px-3 py-1.5 text-xs truncate mono" x-text="f"></button>
              </template>
            </div>
          </div>
          <div class="flex gap-2">
            <button @click="folderPopup = null" class="flex-1 px-3 py-1.5 bg-gray-800 hover:bg-gray-700 rounded text-sm">Cancel</button>
            <button @click="submitFolderPopup()" :disabled="!folderPopup.cwd.trim()"
                    class="flex-1 px-3 py-1.5 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-500 rounded text-sm">Add</button>
          </div>
        </div>
      </div>
    </template>
  </div><!-- /sidebar -->

  <!-- ═══ Main Content ═══ -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Header -->
    <div class="px-4 py-2 border-b border-gray-800 flex items-center gap-3 text-sm bg-gray-900/50 flex-shrink-0">
      <button @click="toggleSidebar()" class="px-2 py-1 bg-gray-800 hover:bg-gray-700 rounded text-xs flex-shrink-0"
              :title="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
              x-text="sidebarCollapsed ? '☰' : '◧'"></button>
      <button @click="toggleTheme()" class="px-2 py-1 bg-gray-800 hover:bg-gray-700 rounded text-xs flex-shrink-0"
              :title="theme === 'light' ? 'Switch to dark' : 'Switch to light'" x-text="theme === 'light' ? '☀' : '☾'"></button>
      <span class="flex-1"></span>
      <span x-show="currentId" class="text-gray-500 text-xs truncate" x-text="managed.find(s => s.sessionId === currentId)?.name || ''"></span>
      <button @click="emit('config-toggle')" class="px-2 py-1 bg-gray-800 hover:bg-gray-700 rounded text-xs flex-shrink-0" title="Agent config">⚙</button>
    </div>

    <!-- Messages -->
    <div x-data="messages" class="flex-1 overflow-y-auto overflow-x-hidden p-4 mono text-sm space-y-1">
      <div x-ref="rendered"></div>
      <template x-for="(block, i) in streaming.blocks" :key="'sb'+i">
        <div>
          <template x-if="block.type === 'text'">
            <div class="message-row message-assistant py-1"><div class="message-content assistant-message md-content" x-html="R.renderMd(block.text)"></div></div>
          </template>
          <template x-if="block.type === 'tool_use'">
            <div class="tool-line text-xs py-0.5" x-html="R.renderToolUse(block.name, block.input)"></div>
          </template>
        </div>
      </template>
      <div x-show="streaming._toolName" class="text-xs py-0.5">
        <span class="tool-kind font-semibold" x-text="streaming._toolName"></span>
        <span class="tool-meta animate-pulse">...</span>
      </div>
      <div x-show="streaming.text" class="message-row message-assistant py-1">
        <div class="message-content assistant-message md-content"><span x-html="R.renderMd(streaming.text)"></span><span class="cursor-blink tool-meta">|</span></div>
      </div>
      <div x-show="$store.active && !streaming.text && streaming.blocks.length === 0 && !streaming._toolName" class="text-gray-600 text-xs py-1">
        <span class="animate-pulse">thinking...</span>
      </div>
    </div>

    <!-- Input -->
    <div class="p-3 border-t border-gray-800 bg-gray-900/30 flex-shrink-0">
      <div x-show="!currentId" class="text-gray-600 text-xs mb-2 text-center">Select an agent or create one from the sidebar</div>
      <div class="flex gap-2">
        <input x-model="inputText" @keydown.enter.prevent="send()"
               :placeholder="currentId ? 'Send a message...' : 'No agent selected'"
               :disabled="!currentId"
               class="flex-1 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm mono outline-none focus:border-gray-500 min-w-0 disabled:opacity-60" />
        <button @click="send()" :disabled="!inputText.trim() || !currentId"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-500 rounded text-sm">Send</button>
        <button x-show="currentId && activeSet.has(currentId)" @click="interruptSession()"
                class="px-3 py-2 bg-red-700 hover:bg-red-600 rounded text-sm">Stop</button>
      </div>
    </div>

    <!-- Status -->
    <div class="px-4 py-1 border-t border-gray-800 text-xs text-gray-600 flex gap-4 flex-shrink-0">
      <span x-text="'cost: $' + totalCost.toFixed(4)"></span>
      <span x-text="'in: ' + totalIn + ' out: ' + totalOut"></span>
      <span x-text="currentId || 'no session'"></span>
      <span x-show="currentId && activeSet.has(currentId)" class="text-green-400">active</span>
    </div>
  </div>

  <!-- ═══ Right Sidebar (Agent Config) ═══ -->
  <div x-data="agentConfig()" class="flex flex-shrink-0">
    <!-- Resize handle -->
    <div x-show="!collapsed" @mousedown.prevent="startResize($event)"
         class="w-1 bg-gray-800 hover:bg-gray-700 active:bg-gray-700 cursor-col-resize flex-shrink-0"></div>

    <div class="bg-gray-900 flex flex-col flex-shrink-0 overflow-hidden transition-[width] duration-200"
         :style="`width: ${collapsed ? 0 : width}px`"
         :class="collapsed ? '' : 'border-l border-gray-800'">

      <template x-if="!session">
        <div class="flex-1 flex items-center justify-center p-4 text-gray-600 text-xs text-center">Select an agent to configure</div>
      </template>

      <template x-if="session">
        <div class="flex-1 overflow-y-auto">
          <div class="p-3 space-y-3 text-xs">
            <!-- Agent identity -->
            <div class="font-semibold text-gray-200 truncate" x-text="session.name"></div>
            <div class="text-gray-500 truncate text-[10px]" x-text="session.cwd"></div>

            <!-- Model -->
            <div>
              <label class="text-gray-500 block mb-1">Model</label>
              <select x-model="model" @change="markDirty()" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs">
                <option value="">(default)</option>
                <option value="sonnet">Sonnet</option>
                <option value="opus">Opus</option>
                <option value="haiku">Haiku</option>
              </select>
            </div>

            <!-- Thinking + Effort -->
            <div class="flex gap-2">
              <div class="flex-1">
                <label class="text-gray-500 block mb-1">Thinking</label>
                <select x-model="thinking" @change="markDirty()" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs">
                  <option value="">(default)</option>
                  <option value="adaptive">adaptive</option>
                  <option value="enabled">enabled</option>
                  <option value="disabled">disabled</option>
                </select>
              </div>
              <div class="flex-1">
                <label class="text-gray-500 block mb-1">Effort</label>
                <select x-model="effort" @change="markDirty()" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs">
                  <option value="">(default)</option>
                  <option value="low">low</option>
                  <option value="medium">medium</option>
                  <option value="high">high</option>
                  <option value="max">max</option>
                </select>
              </div>
            </div>

            <!-- Permission -->
            <div>
              <label class="text-gray-500 block mb-1">Permission</label>
              <select x-model="permissionMode" @change="markDirty()" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs">
                <option value="">(default)</option>
                <option value="bypassPermissions">bypassPermissions</option>
                <option value="default">default</option>
                <option value="acceptEdits">acceptEdits</option>
                <option value="plan">plan</option>
                <option value="dontAsk">dontAsk</option>
              </select>
            </div>

            <!-- System Prompt -->
            <div>
              <button @click="showSystemPrompt = !showSystemPrompt" class="text-gray-400 hover:text-gray-200 flex items-center gap-1">
                <span x-text="showSystemPrompt ? '▾' : '▸'" class="w-3 text-gray-600"></span>System Prompt
              </button>
              <div x-show="showSystemPrompt" class="mt-1">
                <textarea x-model="systemPrompt" @input="markDirty()" rows="4" placeholder="Append to default system prompt..."
                          class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs resize-y"></textarea>
              </div>
            </div>

            <!-- ENV -->
            <div>
              <button @click="showEnv = !showEnv" class="text-gray-400 hover:text-gray-200 flex items-center gap-1">
                <span x-text="showEnv ? '▾' : '▸'" class="w-3 text-gray-600"></span>ENV
              </button>
              <div x-show="showEnv" class="mt-1">
                <textarea x-model="envText" @input="markDirty()" rows="3" placeholder="KEY=value (one per line)"
                          class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs mono resize-y"></textarea>
              </div>
            </div>

            <!-- Advanced JSON -->
            <div>
              <button @click="showJson = !showJson; if (showJson) syncToJson()" class="text-gray-400 hover:text-gray-200 flex items-center gap-1">
                <span x-text="showJson ? '▾' : '▸'" class="w-3 text-gray-600"></span>Advanced JSON
              </button>
              <div x-show="showJson" class="mt-1 space-y-1">
                <textarea x-model="jsonText" rows="8"
                          class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 outline-none text-xs mono resize-y"></textarea>
                <div x-show="jsonError" class="text-red-400 text-[10px]" x-text="jsonError"></div>
                <button @click="saveJson()" class="px-2 py-1 bg-gray-800 border border-gray-700 rounded text-gray-400 hover:text-gray-200 text-xs">Apply JSON</button>
              </div>
            </div>

            <!-- Save button -->
            <button x-show="dirty" @click="save()"
                    class="w-full px-3 py-1.5 bg-blue-600 hover:bg-blue-500 rounded text-xs">Save Config</button>

            <!-- Actions -->
            <div class="flex gap-2 pt-2 border-t border-gray-800">
              <button @click="compact()" :disabled="!isActive"
                      class="flex-1 px-2 py-1.5 bg-gray-800 hover:bg-gray-700 disabled:opacity-40 rounded text-xs">Compact</button>
              <button @click="reload()" :disabled="!isActive"
                      class="flex-1 px-2 py-1.5 bg-gray-800 hover:bg-gray-700 disabled:opacity-40 rounded text-xs">Reload</button>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  </div>
  </template><!-- /main app template -->

</div>

</body>
</html>
